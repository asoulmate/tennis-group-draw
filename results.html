<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
<meta content="#174f46" name="theme-color"/>
<title>테니스 경기 결과 및 순위</title>
<style>
    :root {
      --bg: #f3f7f5;
      --surface: #ffffff;
      --surface-soft: #eef7f3;
      --text: #17211e;
      --muted: #61706b;
      --line: #d9e4df;
      --primary: #176c5b;
      --primary-hover: #115747;
      --primary-soft: #dff2eb;
      --danger: #b42318;
      --danger-soft: #fff1f0;
      --warning: #8a4b08;
      --warning-soft: #fff6e8;
      --success: #176c5b;
      --success-soft: #e8f7f1;
      --loss: #b42318;
      --loss-soft: #fff1f0;
      --draw: #72570a;
      --draw-soft: #fff8da;
      --cancel: #7a4b4b;
      --cancel-soft: #f7eeee;
      --shadow: 0 16px 40px rgba(28, 65, 55, 0.09);
      --radius-lg: 22px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(117, 196, 166, 0.18), transparent 34rem),
        linear-gradient(180deg, #f9fcfa 0%, var(--bg) 100%);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .app-shell {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 64px;
    }

    .page-switcher {
      position: sticky;
      top: 10px;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 8px;
      margin-bottom: 18px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(201,223,215,0.95);
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(28,65,55,0.1);
      backdrop-filter: blur(12px);
    }

    .page-switcher a {
      display: grid;
      place-items: center;
      min-height: 44px;
      padding: 9px 14px;
      color: var(--primary);
      text-align: center;
      text-decoration: none;
      border: 1px solid transparent;
      border-radius: 11px;
      font-size: 0.9rem;
      font-weight: 900;
    }

    .page-switcher a:hover { background: var(--surface-soft); }
    .page-switcher a.active {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 32px;
      margin-bottom: 22px;
      color: #fff;
      background: linear-gradient(135deg, rgba(7,53,45,0.97), rgba(25,115,94,0.94)), var(--primary);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      top: -74px;
      right: -64px;
      width: 220px;
      height: 220px;
      border: 28px solid rgba(255,255,255,0.1);
      border-radius: 50%;
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      margin: 0 0 8px;
      color: #c9f3e6;
      font-size: 0.88rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.3rem);
      line-height: 1.1;
      letter-spacing: -0.045em;
    }

    .hero p {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 13px 0 0;
      color: rgba(255,255,255,0.84);
      font-size: 1rem;
    }

    .layout { display: grid; gap: 20px; }
    .panel {
      padding: 26px;
      background: var(--surface);
      border: 1px solid rgba(217,228,223,0.9);
      border-radius: var(--radius-lg);
      box-shadow: 0 10px 30px rgba(28,65,55,0.055);
    }

    .panel-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel-heading h2 { margin: 0; font-size: 1.42rem; letter-spacing: -0.03em; }
    .panel-heading p { margin: 5px 0 0; color: var(--muted); font-size: 0.96rem; }

    .summary-badge {
      flex: 0 0 auto;
      padding: 8px 12px;
      color: var(--primary);
      background: var(--primary-soft);
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .event-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .meta-chip {
      padding: 7px 11px;
      color: #36534b;
      background: #edf5f2;
      border-radius: 999px;
      font-size: 0.86rem;
      font-weight: 850;
    }

    .message {
      display: none;
      padding: 14px 16px;
      margin-bottom: 16px;
      border-radius: var(--radius-md);
      font-size: 0.94rem;
      font-weight: 800;
    }
    .message.show { display: block; }
    .message.error { color: var(--danger); background: var(--danger-soft); border: 1px solid #f5c9c5; }
    .message.warning { color: var(--warning); background: var(--warning-soft); border: 1px solid #f1d4a6; }
    .message.success { color: var(--success); background: var(--success-soft); border: 1px solid #bfe2d5; }

    .ranking-mode-panel {
      padding: 16px;
      margin: 0 0 18px;
      background: #f7fbf9;
      border: 1px solid #cfe2db;
      border-radius: 16px;
    }

    .ranking-mode-panel legend {
      padding: 0 7px;
      color: #29483f;
      font-size: 0.95rem;
      font-weight: 950;
    }

    .ranking-mode-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .ranking-mode-option {
      position: relative;
      display: block;
      cursor: pointer;
    }

    .ranking-mode-option input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .ranking-mode-copy {
      display: block;
      min-height: 100%;
      padding: 14px 15px;
      background: #fff;
      border: 2px solid #d7e6e0;
      border-radius: 13px;
      transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .ranking-mode-copy strong {
      display: block;
      color: #29483f;
      font-size: 1rem;
      font-weight: 950;
    }

    .ranking-mode-copy small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 750;
      line-height: 1.45;
    }

    .ranking-mode-option input:checked + .ranking-mode-copy {
      background: var(--primary-soft);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(23,108,91,0.09);
    }

    .ranking-mode-option input:focus-visible + .ranking-mode-copy {
      outline: 3px solid rgba(23,108,91,0.24);
      outline-offset: 2px;
    }

    .ranking-mode-help {
      margin: 10px 2px 0;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 800;
    }

    .result-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .summary-card {
      padding: 15px;
      background: #f7fbf9;
      border: 1px solid var(--line);
      border-radius: 14px;
    }
    .summary-card span { display: block; color: var(--muted); font-size: 0.8rem; font-weight: 850; }
    .summary-card strong { display: block; margin-top: 3px; color: var(--primary); font-size: 1.42rem; }

    .standing-list { display: grid; gap: 20px; }
    .standing-card {
      overflow: hidden;
      background: #fff;
      border: 1px solid #c9dfd7;
      border-radius: 18px;
      box-shadow: 0 8px 22px rgba(28,65,55,0.06);
    }

    .standing-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 17px 19px;
      background: linear-gradient(135deg, #edf7f3, #fbfefd);
      border-bottom: 1px solid #d6e7e1;
    }

    .standing-header span {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 850;
    }

    .standing-header h3 {
      margin: 2px 0 0;
      font-size: 1.3rem;
      font-weight: 950;
      letter-spacing: -0.025em;
    }

    .table-scroll {
      overflow-x: auto;
      overscroll-behavior-inline: contain;
    }

    .standing-table {
      width: 100%;
      min-width: 960px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    .standing-table th,
    .standing-table td {
      padding: 12px 9px;
      text-align: center;
      vertical-align: middle;
      border-right: 1px solid #dfe9e5;
      border-bottom: 1px solid #dfe9e5;
    }

    .standing-table th:last-child,
    .standing-table td:last-child { border-right: 0; }
    .standing-table tbody tr:last-child td { border-bottom: 0; }

    .standing-table thead th {
      color: #29483f;
      background: #f2f8f6;
      font-size: 0.88rem;
      font-weight: 950;
      line-height: 1.2;
    }

    .standing-table tbody td {
      background: #fff;
      font-size: 1rem;
      font-weight: 850;
    }

    .standing-table tbody tr:nth-child(even) td { background: #fbfdfc; }

    .position-cell {
      width: 64px;
      color: var(--primary);
      font-size: 1.08rem !important;
      font-weight: 950 !important;
      background: var(--primary-soft) !important;
    }

    .name-cell {
      width: 160px;
      overflow-wrap: anywhere;
      text-align: left !important;
      font-size: 1.08rem !important;
      font-weight: 950 !important;
    }

    .match-cell { width: 78px; }
    .stat-cell { width: 62px; font-size: 1.06rem !important; font-weight: 950 !important; }
    .rank-cell {
      width: 74px;
      color: #fff;
      background: var(--primary) !important;
      font-size: 1.12rem !important;
      font-weight: 950 !important;
    }

    .score-pill {
      display: inline-grid;
      place-items: center;
      min-width: 54px;
      min-height: 34px;
      padding: 5px 8px;
      border-radius: 9px;
      font-size: 0.98rem;
      font-weight: 950;
      white-space: nowrap;
    }
    .score-pill.win { color: var(--success); background: var(--success-soft); border: 1px solid #bfe2d5; }
    .score-pill.loss { color: var(--loss); background: var(--loss-soft); border: 1px solid #f2c6c2; }
    .score-pill.draw { color: var(--draw); background: var(--draw-soft); border: 1px solid #eadb91; }
    .score-pill.pending { color: #87948f; background: #f0f4f2; border: 1px solid #dce5e1; }
    .score-pill.excluded {
      color: var(--cancel);
      background: var(--cancel-soft);
      border: 1px dashed #cdaaaa;
      gap: 1px;
      opacity: 0.88;
    }
    .score-pill.excluded .score-value {
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }
    .score-pill .exclude-label {
      display: block;
      color: var(--danger);
      font-size: 0.62rem;
      font-weight: 950;
      line-height: 1;
      text-decoration: none;
    }
    .excluded-cell { background: #fcf8f8 !important; }

    .plus { color: var(--success); }
    .minus { color: var(--loss); }
    .zero { color: var(--muted); }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 800;
    }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .legend i { width: 12px; height: 12px; border-radius: 4px; }
    .legend .win-dot { background: var(--success-soft); border: 1px solid #9fd0bd; }
    .legend .loss-dot { background: var(--loss-soft); border: 1px solid #e8aaa5; }
    .legend .pending-dot { background: #f0f4f2; border: 1px solid #cdd9d4; }
    .legend .excluded-dot { background: var(--cancel-soft); border: 1px dashed #cdaaaa; }

    .empty-state {
      padding: 32px 18px;
      color: var(--muted);
      text-align: center;
      background: #fbfdfc;
      border: 1px dashed #cddbd5;
      border-radius: 14px;
    }

    .footer-note { margin: 20px 0 0; color: var(--muted); text-align: center; font-size: 0.84rem; }

    @media (max-width: 800px) {
      .result-summary { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .standing-table th, .standing-table td { padding: 10px 7px; }
    }

    @media (max-width: 620px) {
      .app-shell { width: min(100% - 20px,1280px); padding: 18px 0 38px; }
      .hero { padding: 25px 21px; border-radius: 22px; }
      .panel { padding: 20px 15px; border-radius: 18px; }
      .panel-heading { display: grid; }
      .summary-badge { width: fit-content; }
      .result-summary { grid-template-columns: 1fr 1fr; }
      .ranking-mode-options { grid-template-columns: 1fr; }
      .page-switcher a { padding-inline: 5px; font-size: 0.76rem; }
      .standing-card { margin-inline: -4px; }
    }
  

    /* v6 compact standings and capture */
    .app-shell { padding:18px 0 28px; }
    .hero { padding:18px 22px; margin-bottom:12px; border-radius:20px; }
    .hero h1 { font-size:clamp(1.65rem,7vw,2.35rem); }
    .layout { gap:12px; }
    .panel { padding:16px; border-radius:18px; }
    .panel-heading { margin-bottom:10px; }
    .ranking-mode-panel { padding:9px; margin-bottom:10px; }
    .ranking-mode-options { gap:6px; }
    .ranking-mode-copy { padding:8px 10px; border-radius:9px; }
    .ranking-mode-copy strong { font-size:.84rem; }
    .result-summary { grid-template-columns:repeat(3,minmax(0,1fr)); gap:6px; margin-bottom:10px; }
    .summary-card { padding:8px; border-radius:10px; }
    .summary-card span { font-size:.65rem; }
    .summary-card strong { font-size:1rem; }
    .standing-list { gap:10px; }
    .standing-card { border-radius:13px; }
    .standing-header { padding:9px 11px; }
    .standing-header span { font-size:.7rem; }
    .standing-header h3 { font-size:1.02rem; }
    .standing-header-actions { display:flex; align-items:center; gap:5px; flex-wrap:wrap; justify-content:flex-end; }
    .capture-button { min-height:30px; padding:4px 8px; color:var(--primary); background:#fff; border:1px solid #9cc5b8; border-radius:7px; font-size:.68rem; font-weight:950; cursor:pointer; }
    .capture-button:disabled { opacity:.55; cursor:wait; }
    .standing-table { min-width:720px; }
    .standing-table th, .standing-table td { padding:6px 4px; }
    .standing-table thead th { font-size:.68rem; }
    .standing-table tbody td { font-size:.78rem; }
    .position-cell { width:40px; font-size:.84rem !important; }
    .name-cell { width:104px; font-size:.84rem !important; }
    .match-cell { width:55px; }
    .stat-cell { width:39px; font-size:.82rem !important; }
    .rank-cell { width:45px; font-size:.9rem !important; }
    .score-pill { min-width:44px; min-height:27px; padding:3px 5px; border-radius:6px; font-size:.76rem; }
    .score-pill .exclude-label { font-size:.5rem; }
    .capture-clone { position:fixed !important; left:-20000px !important; top:0 !important; z-index:-1 !important; box-shadow:none !important; }
    .capture-clone .table-scroll { overflow:visible !important; }
    .capture-clone .capture-button { display:none !important; }
    .capture-title { padding:10px 12px; color:#173f36; background:#fff; border-bottom:1px solid #d6e7e1; font-size:1rem; font-weight:950; }

    @media (max-width:620px) {
      .app-shell { width:min(100% - 10px,1280px); padding:5px 0 16px; }
      .page-switcher { top:3px; gap:3px; padding:3px; margin-bottom:6px; border-radius:10px; }
      .page-switcher a { min-height:34px; padding:4px 2px; font-size:.69rem; border-radius:7px; }
      .hero { padding:11px 14px; margin-bottom:6px; border-radius:13px; }
      .hero .eyebrow { margin-bottom:2px; font-size:.62rem; }
      .hero h1 { font-size:1.42rem; }
      .panel { padding:9px 7px; border-radius:12px; }
      .panel-heading { margin-bottom:6px; }
      .panel-heading h2 { font-size:1rem; }
      .summary-badge { padding:4px 7px; font-size:.66rem; }
      .ranking-mode-panel { padding:6px; margin-bottom:7px; }
      .ranking-mode-options { grid-template-columns:repeat(2,minmax(0,1fr)); gap:4px; }
      .ranking-mode-copy { padding:6px 5px; text-align:center; }
      .ranking-mode-copy strong { font-size:.72rem; }
      .result-summary { grid-template-columns:repeat(3,minmax(0,1fr)); gap:4px; margin-bottom:7px; }
      .summary-card { padding:5px 4px; }
      .summary-card span { font-size:.55rem; }
      .summary-card strong { font-size:.8rem; }
      .standing-header { padding:7px 8px; }
      .standing-card { margin-inline:0; }
      .standing-table { min-width:680px; }
      .standing-table th, .standing-table td { padding:5px 3px; }
      .standing-table thead th { font-size:.62rem; }
      .standing-table tbody td { font-size:.72rem; }
      .name-cell { width:92px; font-size:.76rem !important; }
      .match-cell { width:50px; }
      .stat-cell { width:36px; font-size:.75rem !important; }
      .score-pill { min-width:40px; font-size:.7rem; }
      .capture-button { min-height:27px; padding:3px 6px; font-size:.62rem; }
    }

    @media (max-width: 620px) {
      .standing-table thead th:first-child, .standing-table .position-cell { position:sticky; left:0; z-index:3; }
      .standing-table thead th:nth-child(2), .standing-table .name-cell { position:sticky; left:40px; z-index:2; box-shadow:3px 0 5px rgba(28,65,55,.08); }
      .standing-table thead th:first-child, .standing-table thead th:nth-child(2) { z-index:5; background:#eaf5f1; }
    }
</style>
</head>
<body>
<main class="app-shell">
<nav aria-label="페이지 이동" class="page-switcher">
<a href="./index.html" id="mainPageLink">1. 추첨·대진 생성</a>
<a href="./scores.html" id="scorePageLink">2. 경기 스코어</a>
<a aria-current="page" class="active" href="./results.html" id="resultsPageLink">3. 경기 결과</a>
</nav>
<header class="hero">
<p class="eyebrow">Tennis Standings</p>
<h1>경기 결과 및 조별 순위</h1>
</header>
<div class="layout"><section aria-labelledby="standingsTitle" class="panel">
<div class="panel-heading">
<div>

<div class="summary-badge" id="statusBadge">집계 대기</div>
</div>
<div aria-live="assertive" class="message" id="messageBox" role="alert"></div><fieldset class="ranking-mode-panel">

<label class="ranking-mode-option">
<input checked="" name="rankingMode" type="radio" value="all4"/>
<span class="ranking-mode-copy">

</span>
</label>
<label class="ranking-mode-option">
<input name="rankingMode" type="radio" value="best3"/>

</span>
</label>
</div>
<p hidden="" id="rankingModeHelp"></p></fieldset>
<div class="result-summary" id="resultSummary"></div>
<div class="standing-list" id="standingList">

</div>
</section><section aria-labelledby="eventTitle" class="panel">
<div class="panel-heading">
<div>

<p hidden="" id="eventDescription"></p>
</div>
<div class="summary-badge" id="roundBadge">-</div>
</div>

<div class="event-meta" id="eventMeta"></div>
</section></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

      let rankingMode = "all4";

      try {
        rankingMode = localStorage.getItem(rankingModeStorageKey) === "best3" ? "best3" : "all4";
      } catch (error) {
        rankingMode = "all4";
      }

      function normalizeText(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function normalizedKey(value) {
        return normalizeText(value).toLocaleLowerCase("ko-KR");
      }

      function buildSiblingPageUrl(fileName) {
        const url = new URL(window.location.href);
        const parts = url.pathname.split("/");
        parts[parts.length - 1] = fileName;
        url.pathname = parts.join("/");
        url.search = "";
        url.hash = "";
        if (eventId) url.searchParams.set("event", eventId);
        if (shareCode) url.searchParams.set("code", shareCode);
        return url.toString();
      }

      mainPageLink.href = buildSiblingPageUrl("index.html");
      scorePageLink.href = buildSiblingPageUrl("scores.html");
      resultsPageLink.href = buildSiblingPageUrl("results.html");

      function scoreKey(scheduleKey, gameNumber) {
        return `${scheduleKey}::${gameNumber}`;
      }

      function playerKey(groupName, position) {
        return `${groupName}\u0000${position}`;
      }

      function createElement(tag, className, text) {
        const element = document.createElement(tag);
        if (className) element.className = className;
        if (text !== undefined) element.textContent = text;
        return element;
      }

      function showMessage(text, type = "warning") {
        messageBox.textContent = text;
        messageBox.className = `message show ${type}`;
      }

      function clearMessage() {
        messageBox.className = "message";
        messageBox.textContent = "";
      }

      function createSummaryCard(label, value) {
        const card = createElement("div", "summary-card");
        card.append(createElement("span", "", label), createElement("strong", "", value));
        return card;
      }

      function getGroupPositionModes(assignments) {
        const pairBuckets = new Map();
        assignments.forEach((assignment) => {
          if (!assignment.pairGroup) return;
          const key = normalizedKey(assignment.pairGroup);
          if (!pairBuckets.has(key)) pairBuckets.set(key, []);
          pairBuckets.get(key).push(assignment);
        });

        const modes = new Map();
        assignments.forEach((assignment) => {
          if (!assignment.pairGroup) {
            modes.set(assignment.name, "aa");
            return;
          }
          const bucket = pairBuckets.get(normalizedKey(assignment.pairGroup)) || [];
          modes.set(assignment.name, bucket[0] === assignment ? "ab-first" : "ab-second");
        });
        return modes;
      }

      function positionFor(mode, index) {
        if (mode === "ab-first") return String(index + 1);
        if (mode === "ab-second") return AB_SECOND_GROUP_SYMBOLS[index] || String(index + 1);
        return POSITION_SYMBOLS[index] || String(index + 1);
      }

      function compareWorstMatches(a, b) {
        const marginA = a.pointsFor - a.pointsAgainst;
        const marginB = b.pointsFor - b.pointsAgainst;
        return (marginA - marginB) ||
          (a.pointsFor - b.pointsFor) ||
          (b.pointsAgainst - a.pointsAgainst) ||
          (b.gameNumber - a.gameNumber);
      }

      function buildStandings() {
        const assignments = eventData?.draw_data?.assignments || [];
        const schedules = eventData?.draw_data?.gameSchedules || [];
        const modes = getGroupPositionModes(assignments);
        const groups = [];
        const playerMap = new Map();

        assignments.forEach((assignment, groupIndex) => {
          const mode = modes.get(assignment.name) || "aa";
          const group = {
            name: assignment.name,
            pairGroup: assignment.pairGroup || "",
            mode,
            order: groupIndex,
            players: []
          };

          (assignment.members || []).forEach((name, memberIndex) => {
            const position = positionFor(mode, memberIndex);
            const player = {
              key: playerKey(assignment.name, position),
              groupName: assignment.name,
              name,
              position,
              originalOrder: memberIndex,
              matches: [],
              wins: 0,
              draws: 0,
              losses: 0,
              pointsFor: 0,
              pointsAgainst: 0,
              difference: 0,
              confirmedMatchCount: 0,
              countedMatchCount: 0,
              excludedMatchCount: 0,
              rank: null
            };
            group.players.push(player);
            playerMap.set(player.key, player);
          });
          groups.push(group);
        });

        let totalGames = 0;
        let confirmedGames = 0;

        schedules.forEach((schedule) => {
          (schedule.games || []).forEach((game) => {
            totalGames += 1;
            const saved = scoreRows.get(scoreKey(schedule.key, game.gameNumber)) || null;
            const confirmed = Boolean(saved && saved.is_confirmed !== false);
            if (confirmed) confirmedGames += 1;

            const register = (playerRef, isTeam1) => {
              const player = playerMap.get(playerKey(playerRef.groupName, playerRef.position));
              if (!player) return;

              const pointsFor = confirmed
                ? Number(isTeam1 ? saved.team1_score : saved.team2_score)
                : null;
              const pointsAgainst = confirmed
                ? Number(isTeam1 ? saved.team2_score : saved.team1_score)
                : null;

              let outcome = "pending";
              if (confirmed) {
                if (pointsFor > pointsAgainst) outcome = "win";
                else if (pointsFor < pointsAgainst) outcome = "loss";
                else outcome = "draw";
              }

              player.matches.push({
                scheduleKey: schedule.key,
                scheduleTitle: schedule.title,
                gameNumber: Number(game.gameNumber),
                confirmed,
                pointsFor,
                pointsAgainst,
                outcome,
                excluded: false
              });
            };

            (game.team1 || []).forEach((player) => register(player, true));
            (game.team2 || []).forEach((player) => register(player, false));
          });
        });

        let excludedPlayerResults = 0;
        let totalPlayers = 0;
        let playersMeetingRequirement = 0;
        const requiredMatches = rankingMode === "best3" ? 3 : 4;

        groups.forEach((group) => {
          group.players.forEach((player) => {
            totalPlayers += 1;
            player.matches.sort((a, b) => a.gameNumber - b.gameNumber);
            const confirmedMatches = player.matches.filter((match) => match.confirmed);
            player.confirmedMatchCount = confirmedMatches.length;

            if (rankingMode === "best3" && confirmedMatches.length > 3) {
              const excludeCount = confirmedMatches.length - 3;
              [...confirmedMatches]
                .sort(compareWorstMatches)
                .slice(0, excludeCount)
                .forEach((match) => {
                  match.excluded = true;
                  excludedPlayerResults += 1;
                });
            }

            const countedMatches = confirmedMatches.filter((match) => !match.excluded);
            player.countedMatchCount = countedMatches.length;
            player.excludedMatchCount = confirmedMatches.length - countedMatches.length;

            countedMatches.forEach((match) => {
              player.pointsFor += match.pointsFor;
              player.pointsAgainst += match.pointsAgainst;
              if (match.outcome === "win") player.wins += 1;
              if (match.outcome === "draw") player.draws += 1;
              if (match.outcome === "loss") player.losses += 1;
            });

            player.difference = player.pointsFor - player.pointsAgainst;
            if (player.confirmedMatchCount >= requiredMatches) playersMeetingRequirement += 1;
          });

          const ranked = [...group.players].sort((a, b) =>
            (b.wins - a.wins) ||
            (b.draws - a.draws) ||
            (a.losses - b.losses) ||
            (b.difference - a.difference) ||
            (a.originalOrder - b.originalOrder)
          );

          let previousSignature = null;
          let currentRank = 0;
          ranked.forEach((player, index) => {
            const signature = `${player.wins}|${player.draws}|${player.losses}|${player.difference}`;
            if (signature !== previousSignature) currentRank = index + 1;
            player.rank = currentRank;
            previousSignature = signature;
          });
        });

        return {
          groups,
          totalGames,
          confirmedGames,
          excludedPlayerResults,
          totalPlayers,
          playersMeetingRequirement,
          requiredMatches,
          rankingComplete: totalPlayers > 0 && playersMeetingRequirement === totalPlayers
        };
      }

      function createScoreCell(match) {
        const cell = createElement("td", `match-cell${match?.excluded ? " excluded-cell" : ""}`);
        const pillClass = match?.excluded
          ? "score-pill excluded"
          : `score-pill ${match?.outcome || "pending"}`;
        const pill = createElement("span", pillClass);

        if (!match || !match.confirmed) {
          pill.textContent = "-";
          pill.title = match
            ? `${match.scheduleTitle} 게임 ${match.gameNumber} · 스코어 미확정`
            : "배정된 경기가 없습니다.";
        } else {
          const scoreValue = createElement("span", "score-value", `${match.pointsFor}:${match.pointsAgainst}`);
          pill.appendChild(scoreValue);

          if (match.excluded) {
            pill.appendChild(createElement("small", "exclude-label", "집계 제외"));
            pill.title = `${match.scheduleTitle} 게임 ${match.gameNumber} · 3경기 균등 집계에서 가장 불리한 경기로 제외`;
          } else {
            pill.title = `${match.scheduleTitle} 게임 ${match.gameNumber}`;
          }
        }

        cell.appendChild(pill);
        return cell;
      }

      function createStandingCard(group, isComplete) {
        const card = createElement("section", "standing-card");
        const header = createElement("div", "standing-header");
        const titleWrap = createElement("div");
        const modeText = group.mode === "aa"
          ? "한울 AA"
          : `한울 AB${group.pairGroup ? ` · ${group.pairGroup}` : ""}`;
        titleWrap.append(createElement("span", "", `${modeText} · 추첨 순번 기준`), createElement("h3", "", group.name));
        const groupExcludedCount = group.players.reduce((sum, player) => sum + player.excludedMatchCount, 0);
        const groupBadgeText = groupExcludedCount > 0
          ? `${group.players.length}명 · 제외 ${groupExcludedCount}건`
          : `${group.players.length}명`;
        const headerActions = createElement("div", "standing-header-actions");
        headerActions.appendChild(createElement("span", "summary-badge", groupBadgeText));
        const captureButton = createElement("button", "capture-button", "이미지 저장");
        captureButton.type = "button";
        captureButton.dataset.captureGroup = group.name;
        captureButton.setAttribute("aria-label", `${group.name} 결과표 이미지 저장`);
        headerActions.appendChild(captureButton);
        header.append(titleWrap, headerActions);

        const maxMatches = Math.max(4, ...group.players.map((player) => player.matches.length));
        const scroll = createElement("div", "table-scroll");
        const table = createElement("table", "standing-table");
        const thead = document.createElement("thead");
        const headRow = document.createElement("tr");
        headRow.append(createElement("th", "", "순번"), createElement("th", "", "Name"));
        for (let index = 0; index < maxMatches; index += 1) {
          headRow.appendChild(createElement("th", "", `${index + 1}경기`));
        }
        ["승", "무", "패", "득", "실", "득실", "순위"].forEach((label) => headRow.appendChild(createElement("th", "", label)));
        thead.appendChild(headRow);

        const tbody = document.createElement("tbody");
        group.players.forEach((player) => {
          const row = document.createElement("tr");
          row.append(
            createElement("td", "position-cell", player.position),
            createElement("td", "name-cell", player.name)
          );

          for (let index = 0; index < maxMatches; index += 1) {
            row.appendChild(createScoreCell(player.matches[index]));
          }

          row.append(
            createElement("td", "stat-cell", String(player.wins)),
            createElement("td", "stat-cell", String(player.draws)),
            createElement("td", "stat-cell", String(player.losses)),
            createElement("td", "stat-cell", String(player.pointsFor)),
            createElement("td", "stat-cell", String(player.pointsAgainst))
          );

          const differenceText = player.difference > 0 ? `+${player.difference}` : String(player.difference);
          const differenceClass = player.difference > 0 ? "plus" : player.difference < 0 ? "minus" : "zero";
          row.append(
            createElement("td", `stat-cell ${differenceClass}`, differenceText),
            createElement("td", "rank-cell", isComplete ? String(player.rank) : String(player.rank))
          );
          tbody.appendChild(row);
        });

        table.append(thead, tbody);
        scroll.appendChild(table);
        card.append(header, scroll);
        return card;
      }

      function updateRankingModeUi() {
        rankingModeInputs.forEach((input) => {
          input.checked = input.value === rankingMode;
        });

        rankingModeHelp.textContent = rankingMode === "best3"
          ? "선수별 확정 경기 중 최대 3경기만 반영합니다. 4경기 완료 선수는 득실차가 가장 낮은 경기 1개가 자동 제외됩니다."
          : "현재 확정된 모든 경기를 집계합니다. 선수별 4경기가 모두 확정되면 최종 순위로 표시됩니다.";
      }

      function renderStandings() {
        if (!eventData) return;
        const {
          groups,
          totalGames,
          confirmedGames,
          excludedPlayerResults,
          totalPlayers,
          playersMeetingRequirement,
          requiredMatches,
          rankingComplete
        } = buildStandings();
        const pendingGames = Math.max(0, totalGames - confirmedGames);
        const modeLabel = rankingMode === "best3" ? "3경기 균등" : "4경기 전체";

        resultSummary.replaceChildren(
          createSummaryCard("집계 방식", modeLabel),
          createSummaryCard("확정 경기", `${confirmedGames}/${totalGames}`),
          createSummaryCard("기준 충족 선수", `${playersMeetingRequirement}/${totalPlayers}명`),
          createSummaryCard("집계 제외", `${excludedPlayerResults}건`),
          createSummaryCard("미확정 경기", `${pendingGames}경기`),
          createSummaryCard("순위 상태", rankingComplete ? "최종" : "잠정")
        );

        statusBadge.textContent = rankingComplete
          ? `${requiredMatches}경기 기준 최종 순위`
          : `${requiredMatches}경기 기준 잠정 순위`;

        standingList.replaceChildren();
        if (!groups.length) {
          standingList.appendChild(createElement("div", "empty-state", "저장된 추첨 결과가 없습니다. 1페이지에서 추첨과 대진을 생성해 주세요."));
          return;
        }

        const fragment = document.createDocumentFragment();
        groups.forEach((group) => fragment.appendChild(createStandingCard(group, rankingComplete)));
        standingList.appendChild(fragment);
      }

      function safeFileName(value) {
        return String(value || "result")
          .replace(/[\\/:*?"<>|]/g, "_")
          .replace(/\s+/g, "_")
          .slice(0, 80);
      }

      async function downloadStandingImage(button) {
        const card = button.closest(".standing-card");
        if (!card || typeof window.html2canvas !== "function") {
          showMessage("이미지 저장 기능을 불러오지 못했습니다.", "error");
          return;
        }

        button.disabled = true;
        const originalText = button.textContent;
        button.textContent = "생성 중";
        let clone = null;
        try {
          const table = card.querySelector(".standing-table");
          const captureWidth = Math.max(760, (table?.scrollWidth || 0) + 4);
          clone = card.cloneNode(true);
          clone.classList.add("capture-clone");
          clone.style.width = `${captureWidth}px`;
          const captureTitle = createElement(
            "div",
            "capture-title",
            `${eventData?.title || "테니스 경기"} · ${button.dataset.captureGroup || "조별 결과"} · ${rankingMode === "best3" ? "3경기 균등" : "4경기 전체"}`
          );
          clone.insertBefore(captureTitle, clone.firstChild);
          document.body.appendChild(clone);

          const canvas = await window.html2canvas(clone, {
            scale: 2,
            backgroundColor: "#ffffff",
            useCORS: true,
            logging: false,
            width: clone.scrollWidth,
            height: clone.scrollHeight,
            windowWidth: clone.scrollWidth,
            windowHeight: clone.scrollHeight
          });

          const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
          if (!blob) throw new Error("이미지 변환 실패");
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `${safeFileName(eventData?.title)}_${safeFileName(button.dataset.captureGroup)}_${rankingMode}.png`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          showMessage(`${button.dataset.captureGroup} 결과표 이미지를 저장했습니다.`, "success");
        } catch (error) {
          console.error(error);
          showMessage(`이미지 저장 실패: ${error.message}`, "error");
        } finally {
          if (clone) clone.remove();
          button.disabled = false;
          button.textContent = originalText;
        }
      }

      standingList.addEventListener("click", (event) => {
        const button = event.target.closest(".capture-button");
        if (button) downloadStandingImage(button);
      });

      function changeRankingMode(nextMode) {
        rankingMode = nextMode === "best3" ? "best3" : "all4";
        try {
          localStorage.setItem(rankingModeStorageKey, rankingMode);
        } catch (error) {
          console.warn("집계 방식 저장 실패:", error);
        }
        updateRankingModeUi();
        renderStandings();
      }

      rankingModeInputs.forEach((input) => {
        input.addEventListener("change", () => {
          if (input.checked) changeRankingMode(input.value);
        });
      });

      updateRankingModeUi();

      async function loadEvent() {
        if (!eventId) {
          eventTitle.textContent = "공유 주소가 필요합니다";
          eventDescription.textContent = "1페이지에서 생성된 사용자 공유 주소로 접속해 주세요.";
          standingList.innerHTML = '<div class="empty-state">주소에 event 값이 없습니다.</div>';
          showMessage("올바른 사용자 공유 주소로 접속해 주세요.", "error");
          return false;
        }

        const { data, error } = await db
          .from("tennis_events")
          .select("*")
          .eq("id", eventId)
          .single();

        if (error) {
          showMessage(`대회 정보를 불러오지 못했습니다: ${error.message}`, "error");
          standingList.innerHTML = '<div class="empty-state">대회 정보를 불러올 수 없습니다.</div>';
          return false;
        }

        if (shareCode && data.share_code !== shareCode) {
          showMessage("공유 코드가 올바르지 않습니다.", "error");
          standingList.innerHTML = '<div class="empty-state">공유 코드가 일치하지 않습니다.</div>';
          return false;
        }

        eventData = data;
        document.title = `${eventData.title || "테니스 경기"} · 경기 결과`;
        const assignments = eventData.draw_data?.assignments || [];
        const schedules = eventData.draw_data?.gameSchedules || [];
        eventTitle.textContent = eventData.title || "테니스 경기";
        eventDescription.textContent = "확정된 스코어를 기준으로 조별 선수 성적을 집계하며, 경기 수가 다른 경우 3경기 균등 집계를 선택할 수 있습니다.";
        roundBadge.textContent = `${eventData.draw_round || 1}회차`;
        eventMeta.replaceChildren(
          createElement("span", "meta-chip", `참가자 ${eventData.draw_data?.totalParticipants || 0}명`),
          createElement("span", "meta-chip", `조 ${assignments.length}개`),
          createElement("span", "meta-chip", `대진표 ${schedules.length}개`),
          createElement("span", "meta-chip", `공유 코드 ${eventData.share_code}`)
        );
        clearMessage();
        return true;
      }

      async function loadScores() {
        if (!eventData) return;
        const { data, error } = await db
          .from("tennis_match_scores")
          .select("*")
          .eq("event_id", String(eventData.id))
          .eq("draw_round", Number(eventData.draw_round || 1));

        if (error) {
          scoreRows = new Map();
          renderStandings();
          showMessage(`스코어를 불러오지 못했습니다. Supabase SQL 적용 여부를 확인해 주세요: ${error.message}`, "error");
          return;
        }

        scoreRows = new Map((data || []).map((row) => [scoreKey(row.schedule_key, row.game_number), row]));
        renderStandings();
      }

      function subscribeRealtime() {
        if (!eventData) return;
        if (scoreChannel) db.removeChannel(scoreChannel);
        if (eventChannel) db.removeChannel(eventChannel);

        scoreChannel = db
          .channel(`tennis-results-${eventData.id}`)
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "tennis_match_scores",
            filter: `event_id=eq.${eventData.id}`
          }, () => loadScores())
          .subscribe();

        eventChannel = db
          .channel(`tennis-event-results-${eventData.id}`)
          .on("postgres_changes", {
            event: "UPDATE",
            schema: "public",
            table: "tennis_events",
            filter: `id=eq.${eventData.id}`
          }, async () => {
            const previousRound = Number(eventData.draw_round || 1);
            const loaded = await loadEvent();
            if (!loaded) return;
            await loadScores();
            if (Number(eventData.draw_round || 1) !== previousRound) {
              showMessage("관리자가 재추첨하여 새로운 대진과 순위표로 갱신되었습니다.", "warning");
            }
          })
          .subscribe();
      }

      (async () => {
        const loaded = await loadEvent();
        if (!loaded) return;
        await loadScores();
        subscribeRealtime();
      })();
    })();
  </script>
</body>
</html>
