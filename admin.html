<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#174f46" />
  <title>테니스 대회 관리자</title>
  <style>
    :root {
      --bg: #f3f7f5;
      --surface: #ffffff;
      --surface-soft: #eef7f3;
      --text: #17211e;
      --muted: #61706b;
      --line: #d9e4df;
      --primary: #176c5b;
      --primary-hover: #115747;
      --primary-soft: #dff2eb;
      --danger: #b42318;
      --danger-soft: #fff1f0;
      --warning: #8a4b08;
      --warning-soft: #fff6e8;
      --success-soft: #e8f7f1;
      --shadow: 0 16px 40px rgba(28, 65, 55, 0.09);
      --radius-lg: 22px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(117, 196, 166, 0.18), transparent 34rem),
        linear-gradient(180deg, #f9fcfa 0%, var(--bg) 100%);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }
    button { cursor: pointer; -webkit-tap-highlight-color: transparent; }

    .app-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 64px;
    }

    .page-switcher {
      position: sticky;
      top: 10px;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 8px;
      margin-bottom: 18px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(201, 223, 215, 0.95);
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(28, 65, 55, 0.1);
      backdrop-filter: blur(12px);
    }

    .page-switcher a {
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 44px;
      padding: 9px 14px;
      color: var(--primary);
      text-align: center;
      text-decoration: none;
      border: 1px solid transparent;
      border-radius: 11px;
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .page-switcher a:hover { background: var(--surface-soft); }
    .page-switcher a.active {
      color: #ffffff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 32px;
      margin-bottom: 22px;
      color: #ffffff;
      background: linear-gradient(135deg, rgba(7, 53, 45, 0.97), rgba(25, 115, 94, 0.94)), var(--primary);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      top: -74px;
      right: -64px;
      width: 220px;
      height: 220px;
      border: 28px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      margin: 0 0 8px;
      color: #c9f3e6;
      font-size: 0.88rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.3rem);
      line-height: 1.1;
      letter-spacing: -0.045em;
    }

    .panel {
      padding: 26px;
      margin-bottom: 20px;
      background: var(--surface);
      border: 1px solid rgba(217, 228, 223, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: 0 10px 30px rgba(28, 65, 55, 0.055);
    }

    .panel-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel-heading h2 {
      margin: 0;
      font-size: 1.3rem;
      letter-spacing: -0.025em;
    }

    .login-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
      gap: 10px;
    }

    .login-grid input {
      min-width: 0;
      min-height: 46px;
      padding: 10px 13px;
      color: var(--text);
      background: #ffffff;
      border: 1px solid #cbd9d3;
      border-radius: var(--radius-sm);
      outline: none;
    }

    .login-grid input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(23, 108, 91, 0.13);
    }

    .button {
      min-height: 46px;
      padding: 10px 15px;
      border: 1px solid #9cc5b8;
      border-radius: 11px;
      font-weight: 900;
    }

    .button.primary { color: #ffffff; background: var(--primary); border-color: var(--primary); }
    .button.primary:hover { background: var(--primary-hover); }
    .button.secondary { color: var(--primary); background: #ffffff; }
    .button.secondary:hover { background: var(--surface-soft); }
    .button.danger { color: var(--danger); background: #ffffff; border-color: #e6aaa4; }
    .button:disabled { opacity: 0.55; cursor: wait; }

    .admin-status {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface-soft);
      border: 1px solid #d2e6df;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 850;
    }
    .admin-status.show { display: flex; }

    .message {
      display: none;
      padding: 14px 16px;
      margin-bottom: 16px;
      border-radius: var(--radius-md);
      font-size: 0.92rem;
      font-weight: 750;
    }
    .message.show { display: block; }
    .message.error { color: var(--danger); background: var(--danger-soft); border: 1px solid #f5c9c5; }
    .message.success { color: var(--primary); background: var(--success-soft); border: 1px solid #bfe2d5; }
    .message.warning { color: var(--warning); background: var(--warning-soft); border: 1px solid #f1d4a6; }

    .event-list { display: grid; gap: 14px; }
    .empty {
      padding: 34px 18px;
      color: var(--muted);
      text-align: center;
      background: #fbfdfc;
      border: 1px dashed #cbd9d3;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
    }

    .event-card {
      overflow: hidden;
      background: #ffffff;
      border: 1px solid #c9dfd7;
      border-radius: 18px;
      box-shadow: 0 8px 22px rgba(28, 65, 55, 0.05);
    }

    .event-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      background: linear-gradient(135deg, #dff2eb, #f7fcfa);
      border-bottom: 1px solid #cfe2db;
    }

    .event-title { min-width: 0; }
    .event-title h3 {
      overflow-wrap: anywhere;
      margin: 0;
      font-size: 1.12rem;
      letter-spacing: -0.02em;
    }

    .event-badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      flex: 0 0 auto;
    }

    .event-round, .event-status {
      padding: 6px 9px;
      color: var(--primary);
      background: #ffffff;
      border: 1px solid #b9d9ce;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 950;
      white-space: nowrap;
    }
    .event-status.ended { color: #745506; background: #fff7d8; border-color: #dec66e; }

    .event-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 14px 18px;
    }

    .meta {
      min-width: 0;
      padding: 11px 10px;
      background: #f6faf8;
      border: 1px solid #e7efec;
      border-radius: 12px;
      text-align: center;
    }
    .meta span { display: block; color: var(--muted); font-size: 0.72rem; font-weight: 800; }
    .meta strong { display: block; overflow-wrap: anywhere; margin-top: 3px; font-size: 0.84rem; }

    .event-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 0 18px 16px;
    }

    .event-actions a, .event-actions button {
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 42px;
      padding: 8px 7px;
      color: var(--primary);
      background: #ffffff;
      border: 1px solid #a9cfc2;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 900;
    }
    .event-actions a:hover, .event-actions button:hover { background: var(--surface-soft); }
    .event-actions .manual-snapshot { color: #745506; border-color: #dac87b; }
    .event-actions .end-event { color: #745506; border-color: #d9c571; background: #fffdf3; }
    .event-actions .end-event.reopen { color: var(--primary); border-color: #9cc5b8; background: #f6fcf9; }
    .event-actions .delete-event { color: #ffffff; background: var(--danger); border-color: var(--danger); }

    .event-card.ended { border-color: #dccb86; }
    .event-card.ended .event-head { background: linear-gradient(135deg, #fff8dc, #fffef8); }

    .snapshot-area {
      display: none;
      padding: 14px 18px 18px;
      background: #fbfdfc;
      border-top: 1px solid #e2ebe7;
    }
    .snapshot-area.show { display: block; }
    .snapshot-list { display: grid; gap: 8px; }

    .snapshot-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 11px 12px;
      background: #ffffff;
      border: 1px solid #e0eae6;
      border-radius: 11px;
    }

    .snapshot-copy { min-width: 0; }
    .snapshot-copy strong { display: block; overflow-wrap: anywhere; font-size: 0.86rem; }
    .snapshot-copy span { display: block; margin-top: 3px; color: var(--muted); font-size: 0.72rem; }
    .snapshot-kind {
      display: inline-flex !important;
      width: fit-content;
      margin: 0 0 4px !important;
      padding: 3px 7px;
      color: var(--primary) !important;
      background: #e4f4ee;
      border-radius: 999px;
      font-size: 0.66rem !important;
      font-weight: 950;
    }
    .snapshot-kind.manual { color: #745506 !important; background: #fff5cf; }

    .restore-button {
      min-height: 38px;
      padding: 7px 11px;
      color: var(--danger);
      background: #ffffff;
      border: 1px solid #e3aaa5;
      border-radius: 9px;
      font-size: 0.76rem;
      font-weight: 900;
    }

    @media (max-width: 720px) {
      .app-shell { width: min(100% - 10px, 1120px); padding: 5px 0 16px; }
      .page-switcher { top: 3px; gap: 3px; padding: 3px; margin-bottom: 6px; border-radius: 10px; }
      .page-switcher a { min-height: 34px; padding: 4px 2px; font-size: 0.64rem; border-radius: 7px; letter-spacing: -0.03em; }
      .hero { padding: 11px 14px; margin-bottom: 6px; border-radius: 13px; }
      .hero::after { width: 150px; height: 150px; border-width: 20px; }
      .eyebrow { margin-bottom: 2px; font-size: 0.62rem; }
      .hero h1 { font-size: 1.42rem; }
      .panel { padding: 10px 9px; margin-bottom: 7px; border-radius: 14px; }
      .panel-heading { gap: 8px; margin-bottom: 9px; }
      .panel-heading h2 { font-size: 1.04rem; }
      .login-grid { grid-template-columns: 1fr; gap: 6px; }
      .login-grid input, .button { min-height: 42px; }
      .admin-status { padding: 8px 9px; font-size: 0.76rem; }
      .message { padding: 9px 10px; margin-bottom: 8px; font-size: 0.76rem; }
      .event-list { gap: 8px; }
      .event-card { border-radius: 13px; }
      .event-head { gap: 8px; padding: 10px; }
      .event-title h3 { font-size: 0.98rem; }
      .event-round, .event-status { padding: 4px 7px; font-size: 0.68rem; }
      .event-meta { gap: 5px; padding: 7px; }
      .meta { padding: 6px 3px; border-radius: 8px; }
      .meta span { font-size: 0.58rem; }
      .meta strong { font-size: 0.66rem; line-height: 1.3; }
      .event-actions { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 5px; padding: 0 7px 7px; }
      .event-actions a, .event-actions button { min-height: 36px; padding: 5px 3px; font-size: 0.67rem; border-radius: 8px; }
      .snapshot-area { padding: 7px; }
      .snapshot-row { gap: 6px; padding: 7px; }
      .snapshot-copy strong { font-size: 0.75rem; }
      .snapshot-copy span { font-size: 0.62rem; }
      .snapshot-kind { font-size: 0.56rem !important; }
      .restore-button { min-height: 32px; padding: 4px 8px; font-size: 0.67rem; }
      .empty { padding: 24px 12px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
<main class="app-shell">
  <nav aria-label="페이지 이동" class="page-switcher">
    <a href="./index.html" id="mainPageLink">1. 추첨·대진 생성</a>
    <a href="./scores.html" id="scorePageLink">2. 경기 스코어</a>
    <a href="./results.html" id="resultsPageLink">3. 경기 결과</a>
    <a aria-current="page" class="active" href="./admin.html" id="adminPageLink">관리자</a>
  </nav>
  <header class="hero">
    <p class="eyebrow">Tournament Administration</p>
    <h1>대회 관리자</h1>
  </header>
  <section class="panel">
    <div class="panel-heading"><h2>관리자 로그인</h2></div>
    <div id="messageBox" class="message" role="alert" aria-live="assertive"></div>
    <div id="loginPanel" class="login-grid">
      <input id="adminEmail" type="email" autocomplete="username" placeholder="관리자 이메일" />
      <input id="adminPassword" type="password" autocomplete="current-password" placeholder="관리자 비밀번호" />
      <button id="loginButton" class="button primary" type="button">로그인</button>
    </div>
    <div id="adminStatus" class="admin-status"><span id="adminStatusText"></span><button id="logoutButton" class="button secondary" type="button">로그아웃</button></div>
  </section>
  <section class="panel">
    <div class="panel-heading"><h2>내 대회 목록</h2><button id="refreshButton" class="button secondary" type="button">새로고침</button></div>
    <div id="eventList" class="event-list"><div class="empty">관리자 로그인 후 대회 목록을 확인할 수 있습니다.</div></div>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(() => {
  "use strict";
  const SUPABASE_URL = "https://mktdpjkcumyamweynqmp.supabase.co";
  const SUPABASE_KEY = "sb_publishable_lwcj15eyh93kU0Jq2kT8Ng_MaDE7BUN";
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const loginPanel = document.getElementById("loginPanel");
  const adminEmail = document.getElementById("adminEmail");
  const adminPassword = document.getElementById("adminPassword");
  const loginButton = document.getElementById("loginButton");
  const logoutButton = document.getElementById("logoutButton");
  const adminStatus = document.getElementById("adminStatus");
  const adminStatusText = document.getElementById("adminStatusText");
  const refreshButton = document.getElementById("refreshButton");
  const eventList = document.getElementById("eventList");
  const messageBox = document.getElementById("messageBox");
  const mainPageLink = document.getElementById("mainPageLink");
  const scorePageLink = document.getElementById("scorePageLink");
  const resultsPageLink = document.getElementById("resultsPageLink");
  const adminPageLink = document.getElementById("adminPageLink");
  const EVENT_CONTEXT_STORAGE_KEY = "tennis-current-event-context";
  let currentUser = null;

  function readEventContext() {
    try {
      const raw = sessionStorage.getItem(EVENT_CONTEXT_STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      return parsed && parsed.eventId ? parsed : null;
    } catch (_) {
      return null;
    }
  }

  function saveEventContext(nextEventId, nextShareCode) {
    if (!nextEventId) return;
    try {
      sessionStorage.setItem(EVENT_CONTEXT_STORAGE_KEY, JSON.stringify({
        eventId: String(nextEventId),
        shareCode: String(nextShareCode || ""),
        savedAt: Date.now()
      }));
    } catch (_) {
      // 세션 저장소를 사용할 수 없어도 현재 URL로 계속 동작합니다.
    }
  }

  function buildSiblingPageUrl(fileName, nextEventId, nextShareCode) {
    const url = new URL(window.location.href);
    const parts = url.pathname.split("/");
    parts[parts.length - 1] = fileName;
    url.pathname = parts.join("/");
    url.search = "";
    url.hash = "";
    if (nextEventId) url.searchParams.set("event", String(nextEventId));
    if (nextShareCode) url.searchParams.set("code", String(nextShareCode));
    return url.toString();
  }

  function initializeReturnLinks() {
    const params = new URLSearchParams(window.location.search);
    let returnEventId = params.get("event") || "";
    let returnShareCode = params.get("code") || "";

    if (!returnEventId) {
      const savedContext = readEventContext();
      if (savedContext?.eventId) {
        returnEventId = String(savedContext.eventId);
        returnShareCode = String(savedContext.shareCode || "");
        const recoveredUrl = new URL(window.location.href);
        recoveredUrl.searchParams.set("event", returnEventId);
        if (returnShareCode) recoveredUrl.searchParams.set("code", returnShareCode);
        window.history.replaceState({}, "", recoveredUrl.toString());
      }
    }

    if (returnEventId) saveEventContext(returnEventId, returnShareCode);
    mainPageLink.href = buildSiblingPageUrl("index.html", returnEventId, returnShareCode);
    scorePageLink.href = buildSiblingPageUrl("scores.html", returnEventId, returnShareCode);
    resultsPageLink.href = buildSiblingPageUrl("results.html", returnEventId, returnShareCode);
    adminPageLink.href = buildSiblingPageUrl("admin.html", returnEventId, returnShareCode);
  }

  initializeReturnLinks();

  function showMessage(text, type="warning") { messageBox.textContent=text; messageBox.className=`message show ${type}`; }
  function clearMessage() { messageBox.textContent=""; messageBox.className="message"; }
  function empty(text) { const div=document.createElement("div"); div.className="empty"; div.textContent=text; return div; }
  function formatDate(value) {
    if (!value) return "-";
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return "-";
    return new Intl.DateTimeFormat("ko-KR", {year:"2-digit",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).format(date);
  }
  function daysUntil(value) {
    if (!value) return null;
    const target = new Date(value);
    if (Number.isNaN(target.getTime())) return null;
    return Math.max(0, Math.ceil((target.getTime() - Date.now()) / 86400000));
  }
  function eventUrl(page, item) {
    const url = new URL(page, window.location.href);
    url.searchParams.set("event", item.event_id);
    if (item.share_code) url.searchParams.set("code", item.share_code);
    return url.toString();
  }
  function setLoginUi(user) {
    currentUser = user || null;
    loginPanel.style.display = currentUser ? "none" : "grid";
    adminStatus.classList.toggle("show", Boolean(currentUser));
    adminStatusText.textContent = currentUser ? `로그인: ${currentUser.email || "관리자"}` : "";
    if (!currentUser) {
      eventList.replaceChildren(empty("관리자 로그인 후 대회 목록을 확인할 수 있습니다."));
    }
  }

  async function login() {
    const email=adminEmail.value.trim(), password=adminPassword.value;
    if (!email || !password) return showMessage("이메일과 비밀번호를 입력해 주세요.","warning");
    loginButton.disabled=true; loginButton.textContent="로그인 중";
    const {data,error}=await db.auth.signInWithPassword({email,password});
    loginButton.disabled=false; loginButton.textContent="로그인";
    if (error) return showMessage(`로그인 실패: ${error.message}`,"error");
    adminPassword.value=""; setLoginUi(data.user); clearMessage(); await loadEvents();
  }

  async function loadEvents() {
    if (!currentUser) return;
    refreshButton.disabled=true; eventList.replaceChildren(empty("대회 목록을 불러오고 있습니다."));

    // Cron이 비활성화된 환경에서도 관리자 페이지를 열 때 만료 백업을 정리합니다.
    const cleanupResponse = await db.rpc("cleanup_expired_tennis_snapshots");
    if (cleanupResponse.error) {
      console.warn("만료 백업 정리 생략:", cleanupResponse.error);
    }

    const {data,error}=await db.rpc("list_my_tennis_events");
    refreshButton.disabled=false;
    if (error) {
      eventList.replaceChildren(empty("대회 목록을 불러오지 못했습니다."));
      return showMessage(`목록 조회 실패: ${error.message}. 최신 Supabase 설정 SQL을 실행했는지 확인해 주세요.`,"error");
    }
    const items=Array.isArray(data)?data:[];
    eventList.replaceChildren();
    if (!items.length) return eventList.appendChild(empty("생성한 대회가 없습니다."));
    items.forEach(item=>eventList.appendChild(createEventCard(item)));
  }

  function createEventCard(item) {
    const isEnded = Boolean(item.ended_at);
    const card=document.createElement("article");
    card.className=`event-card${isEnded ? " ended" : ""}`;
    card.dataset.eventId=item.event_id;

    const head=document.createElement("div");
    head.className="event-head";
    const title=document.createElement("div");
    title.className="event-title";
    const h3=document.createElement("h3");
    h3.textContent=item.event_title||"테니스 경기";
    title.appendChild(h3);

    const badges=document.createElement("div");
    badges.className="event-badges";
    const round=document.createElement("span");
    round.className="event-round";
    round.textContent=`${item.draw_round||1}회차`;
    const status=document.createElement("span");
    status.className=`event-status${isEnded ? " ended" : ""}`;
    status.textContent=isEnded ? "종료" : "진행 중";
    badges.append(round,status);
    head.append(title,badges);

    const deleteDays=daysUntil(item.snapshot_delete_at);
    const backupText=isEnded
      ? (deleteDays === 0 ? "백업 정리 대상" : `백업 ${deleteDays}일 후 삭제`)
      : `자동 ${item.auto_snapshot_count||0}/10 · 수동 ${item.manual_snapshot_count||0}`;

    const meta=document.createElement("div");
    meta.className="event-meta";
    [
      ["생성",formatDate(item.created_at)],
      [isEnded ? "종료" : "최근 수정",formatDate(isEnded ? item.ended_at : item.updated_at)],
      ["백업",backupText]
    ].forEach(([label,value])=>{
      const box=document.createElement("div");box.className="meta";
      const labelEl=document.createElement("span");labelEl.textContent=label;
      const valueEl=document.createElement("strong");valueEl.textContent=value;
      box.append(labelEl,valueEl);meta.appendChild(box);
    });

    const actions=document.createElement("div");
    actions.className="event-actions";
    [["1. 추첨·대진","./index.html"],["2. 경기 스코어","./scores.html"],["3. 경기 결과","./results.html"]].forEach(([label,page])=>{
      const a=document.createElement("a");a.textContent=label;a.href=eventUrl(page,item);actions.appendChild(a);
    });

    const toggle=document.createElement("button");
    toggle.type="button";toggle.className="snapshot-toggle";toggle.textContent="이전 버전 보기";
    const manual=document.createElement("button");
    manual.type="button";manual.className="manual-snapshot";
    manual.textContent=(isEnded && deleteDays === 0) ? "백업 기간 만료" : "현재 상태 백업";
    manual.disabled=Boolean(isEnded && deleteDays === 0);
    const endButton=document.createElement("button");
    endButton.type="button";
    endButton.className=`end-event${isEnded ? " reopen" : ""}`;
    endButton.textContent=isEnded ? "종료 취소" : "대회 종료";
    const deleteButton=document.createElement("button");
    deleteButton.type="button";deleteButton.className="delete-event";deleteButton.textContent="대회 삭제";
    actions.append(toggle,manual,endButton,deleteButton);

    const area=document.createElement("div");
    area.className="snapshot-area";
    area.appendChild(empty("이전 버전을 불러오지 않았습니다."));

    toggle.addEventListener("click",async()=>{
      const open=area.classList.toggle("show");
      toggle.textContent=open?"이전 버전 닫기":"이전 버전 보기";
      if(open)await loadSnapshots(item,area);
    });

    manual.addEventListener("click",async()=>{
      manual.disabled=true;
      const {error}=await db.rpc("create_tennis_event_snapshot",{
        p_event_id:String(item.event_id),p_reason:"관리자 수동 백업"
      });
      manual.disabled=false;
      if(error)return showMessage(`백업 실패: ${error.message}`,"error");
      showMessage(`${item.event_title} 현재 상태를 백업했습니다.`,"success");
      await loadEvents();
    });

    endButton.addEventListener("click",async()=>{
      const question=isEnded
        ? `「${item.event_title}」을 다시 진행 중 상태로 바꿀까요?`
        : `「${item.event_title}」을 종료 처리할까요?\n\n종료 후 30일이 지나면 자동·수동 백업이 모두 삭제됩니다. 대회와 스코어는 유지됩니다.`;
      if(!window.confirm(question))return;
      endButton.disabled=true;
      endButton.textContent=isEnded?"처리 중":"종료 중";
      const {error}=await db.rpc("set_tennis_event_ended",{
        p_event_id:String(item.event_id),p_is_ended:!isEnded
      });
      endButton.disabled=false;
      if(error)return showMessage(`상태 변경 실패: ${error.message}`,"error");
      showMessage(isEnded?`${item.event_title}을 진행 중 상태로 변경했습니다.`:`${item.event_title}을 종료 처리했습니다. 백업은 30일간 보관됩니다.`,"success");
      await loadEvents();
    });

    deleteButton.addEventListener("click",async()=>{
      const typed=window.prompt(
        `「${item.event_title}」을 완전히 삭제합니다.\n대회, 스코어, 자동·수동 백업을 복구할 수 없습니다.\n\n계속하려면 '삭제'를 입력하세요.`
      );
      if(typed!=="삭제")return;
      deleteButton.disabled=true;
      deleteButton.textContent="삭제 중";
      const {error}=await db.rpc("delete_tennis_event",{p_event_id:String(item.event_id)});
      deleteButton.disabled=false;
      if(error)return showMessage(`대회 삭제 실패: ${error.message}`,"error");
      showMessage(`${item.event_title}과 관련 데이터를 모두 삭제했습니다.`,"success");
      await loadEvents();
    });

    card.append(head,meta,actions,area);
    return card;
  }

  async function loadSnapshots(item, area) {
    area.replaceChildren(empty("이전 버전을 불러오고 있습니다."));
    const {data,error}=await db.rpc("list_tennis_event_snapshots",{p_event_id:String(item.event_id)});
    if(error){area.replaceChildren(empty(`조회 실패: ${error.message}`));return}
    const rows=Array.isArray(data)?data:[]; area.replaceChildren();
    if(!rows.length)return area.appendChild(empty("저장된 이전 버전이 없습니다."));
    const list=document.createElement("div");list.className="snapshot-list";
    rows.forEach(row=>{
      const line=document.createElement("div");line.className="snapshot-row";const copy=document.createElement("div");copy.className="snapshot-copy";const kind=document.createElement("span");kind.className=`snapshot-kind${row.snapshot_type==="manual"?" manual":""}`;kind.textContent=row.snapshot_type==="manual"?"수동 백업":"자동 백업";const strong=document.createElement("strong");strong.textContent=row.snapshot_reason||"자동 백업";const span=document.createElement("span");span.textContent=`${row.source_round||1}회차 · 확정 ${row.confirmed_score_count||0}경기 · ${formatDate(row.created_at)}`;copy.append(kind,strong,span);
      const restore=document.createElement("button");restore.type="button";restore.className="restore-button";restore.textContent="복원";
      restore.addEventListener("click",async()=>{
        if(!window.confirm(`「${item.event_title}」을 ${formatDate(row.created_at)} 상태로 복원할까요?\n현재 상태도 복원 직전에 자동 백업됩니다.`))return;
        restore.disabled=true;restore.textContent="복원 중";
        const {error}=await db.rpc("restore_tennis_event_snapshot",{p_snapshot_id:Number(row.snapshot_id)});
        restore.disabled=false;restore.textContent="복원";
        if(error)return showMessage(`복원 실패: ${error.message}`,"error");
        showMessage(`${item.event_title}을 선택한 이전 버전으로 복원했습니다.`,"success");await loadEvents();
      });
      line.append(copy,restore);list.appendChild(line);
    });
    area.appendChild(list);
  }

  loginButton.addEventListener("click",login);
  adminPassword.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();login()}});
  logoutButton.addEventListener("click",async()=>{await db.auth.signOut();setLoginUi(null);showMessage("로그아웃했습니다.","success")});
  refreshButton.addEventListener("click",loadEvents);
  db.auth.onAuthStateChange((_event,session)=>{setLoginUi(session?.user||null)});
  db.auth.getSession().then(async({data,error})=>{if(error){showMessage(`세션 확인 실패: ${error.message}`,"error");return}setLoginUi(data.session?.user||null);if(data.session?.user)await loadEvents()});
})();
</script>
</body>
</html>
