<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
<meta content="#174f46" name="theme-color"/>
<title>테니스 경기 스코어</title>
<style>
    :root {
      --bg: #f3f7f5;
      --surface: #ffffff;
      --surface-soft: #eef7f3;
      --text: #17211e;
      --muted: #61706b;
      --line: #d9e4df;
      --primary: #176c5b;
      --primary-hover: #115747;
      --primary-soft: #dff2eb;
      --danger: #b42318;
      --danger-soft: #fff1f0;
      --warning: #8a4b08;
      --warning-soft: #fff6e8;
      --success: #176c5b;
      --success-soft: #e8f7f1;
      --shadow: 0 16px 40px rgba(28, 65, 55, 0.09);
      --radius-lg: 22px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(117, 196, 166, 0.18), transparent 34rem),
        linear-gradient(180deg, #f9fcfa 0%, var(--bg) 100%);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }

    .app-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 64px;
    }

    .page-switcher {
      position: sticky;
      top: 10px;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 8px;
      margin-bottom: 18px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(201,223,215,0.95);
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(28,65,55,0.1);
      backdrop-filter: blur(12px);
    }

    .page-switcher a {
      display: grid;
      place-items: center;
      min-height: 44px;
      padding: 9px 14px;
      color: var(--primary);
      text-decoration: none;
      border: 1px solid transparent;
      border-radius: 11px;
      font-size: 0.9rem;
      font-weight: 900;
    }

    .page-switcher a:hover { background: var(--surface-soft); }
    .page-switcher a.active {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 32px;
      margin-bottom: 22px;
      color: #fff;
      background: linear-gradient(135deg, rgba(7,53,45,0.97), rgba(25,115,94,0.94)), var(--primary);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      top: -74px;
      right: -64px;
      width: 220px;
      height: 220px;
      border: 28px solid rgba(255,255,255,0.1);
      border-radius: 50%;
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      margin: 0 0 8px;
      color: #c9f3e6;
      font-size: 0.88rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.3rem);
      line-height: 1.1;
      letter-spacing: -0.045em;
    }

    .hero p {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 13px 0 0;
      color: rgba(255,255,255,0.82);
    }

    .layout { display: grid; gap: 20px; }
    .panel {
      padding: 26px;
      background: var(--surface);
      border: 1px solid rgba(217,228,223,0.9);
      border-radius: var(--radius-lg);
      box-shadow: 0 10px 30px rgba(28,65,55,0.055);
    }

    .panel-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel-heading h2 { margin: 0; font-size: 1.3rem; letter-spacing: -0.025em; }
    .panel-heading p { margin: 5px 0 0; color: var(--muted); font-size: 0.92rem; }

    .summary-badge {
      flex: 0 0 auto;
      padding: 8px 12px;
      color: var(--primary);
      background: var(--primary-soft);
      border-radius: 999px;
      font-size: 0.86rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .meta-chip {
      padding: 7px 11px;
      color: #36534b;
      background: #edf5f2;
      border-radius: 999px;
      font-size: 0.84rem;
      font-weight: 850;
    }

    .message {
      display: none;
      padding: 14px 16px;
      margin-bottom: 16px;
      border-radius: var(--radius-md);
      font-size: 0.92rem;
      font-weight: 750;
    }
    .message.show { display: block; }
    .message.error { color: var(--danger); background: var(--danger-soft); border: 1px solid #f5c9c5; }
    .message.warning { color: var(--warning); background: var(--warning-soft); border: 1px solid #f1d4a6; }
    .message.success { color: var(--success); background: var(--success-soft); border: 1px solid #bfe2d5; }

    .score-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .summary-card {
      padding: 15px;
      background: #f7fbf9;
      border: 1px solid var(--line);
      border-radius: 14px;
    }
    .summary-card span { display: block; color: var(--muted); font-size: 0.78rem; font-weight: 800; }
    .summary-card strong { display: block; margin-top: 3px; color: var(--primary); font-size: 1.35rem; }

    .schedule-list { display: grid; gap: 18px; }
    .schedule-card {
      overflow: hidden;
      border: 1px solid #c9dfd7;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(28,65,55,0.06);
    }

    .schedule-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      background: linear-gradient(135deg, #edf7f3, #fbfefd);
      border-bottom: 1px solid #d6e7e1;
    }
    .schedule-header span { display: block; color: var(--muted); font-size: 0.9rem; font-weight: 850; }
    .schedule-header h3 { margin: 2px 0 0; font-size: 1.28rem; font-weight: 950; }

    .game-list { display: grid; gap: 10px; margin: 0; padding: 13px; list-style: none; }
    .score-game-row {
      display: grid;
      grid-template-columns: 82px minmax(0,1fr) minmax(210px,260px) minmax(0,1fr);
      gap: 10px;
      align-items: stretch;
      padding: 10px;
      background: #fbfdfc;
      border: 1px solid #e0eae6;
      border-radius: 13px;
    }
    .score-game-row.confirmed { background: #f4faf7; border-color: #b9d9ce; }
    .score-game-row.editing { box-shadow: 0 0 0 3px rgba(23,108,91,0.1); }

    .game-number {
      display: grid;
      place-items: center;
      min-height: 86px;
      padding: 6px;
      color: var(--primary);
      background: var(--primary-soft);
      border-radius: 10px;
      font-size: 0.98rem;
      font-weight: 950;
      text-align: center;
    }

    .team-box {
      display: grid;
      grid-template-columns: repeat(2,minmax(0,1fr));
      gap: 7px;
      min-width: 0;
    }

    .player-box {
      display: grid;
      align-content: center;
      min-width: 0;
      padding: 11px 12px;
      background: #fff;
      border: 1px solid #dbe7e2;
      border-radius: 10px;
    }
    .player-position { color: var(--muted); font-size: 0.96rem; font-weight: 900; }
    .player-name { overflow-wrap: anywhere; font-size: 1.38rem; line-height: 1.2; font-weight: 950; letter-spacing: -0.02em; }

    .score-control {
      display: grid;
      grid-template-columns: minmax(44px,1fr) 18px minmax(44px,1fr);
      gap: 7px;
      align-content: center;
      align-items: center;
      padding: 8px;
      background: #fff;
      border: 1px solid #dbe7e2;
      border-radius: 11px;
    }

    .score-control input {
      width: 100%;
      min-width: 0;
      min-height: 44px;
      padding: 7px;
      color: var(--text);
      text-align: center;
      background: #fff;
      border: 1px solid #cbd9d3;
      border-radius: 9px;
      outline: none;
      font-size: 1.38rem;
      font-weight: 950;
    }
    .score-control input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(23,108,91,0.12); }
    .score-control input:disabled { color: #29483f; background: #eef4f1; opacity: 1; }
    .score-separator { color: var(--muted); text-align: center; font-size: 1.25rem; font-weight: 950; }

    .score-actions {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 7px;
      margin-top: 2px;
    }

    .button {
      min-height: 42px;
      padding: 9px 13px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 900;
      cursor: pointer;
    }
    .button-primary { color: #fff; background: var(--primary); border: 1px solid var(--primary); }
    .button-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .button-secondary { color: var(--primary); background: #fff; border: 1px solid #9cc5b8; }
    .button-danger { color: var(--danger); background: #fff; border: 1px solid #e8aaa5; }
    .button:disabled { color: #93a09b; background: #eef2f0; border-color: #d9e1de; cursor: not-allowed; }

    .score-state {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 0.73rem;
      font-weight: 800;
    }
    .confirmed-label { color: var(--primary); }

    .admin-panel {
      display: grid;
      grid-template-columns: minmax(0,1fr) minmax(0,1fr) auto;
      gap: 10px;
      padding: 16px;
      background: #f2f8f6;
      border: 1px solid #d2e6df;
      border-radius: 14px;
    }

    .admin-panel input {
      width: 100%;
      min-height: 46px;
      padding: 10px 13px;
      border: 1px solid #cbd9d3;
      border-radius: 10px;
      outline: none;
    }
    .admin-panel input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(23,108,91,0.13); }

    .admin-status {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      color: #31564d;
      background: #eef8f4;
      border: 1px solid #cee8de;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .empty-state {
      padding: 30px 18px;
      color: var(--muted);
      text-align: center;
      background: #fbfdfc;
      border: 1px dashed #cddbd5;
      border-radius: 14px;
    }

    .footer-note { margin: 20px 0 0; color: var(--muted); text-align: center; font-size: 0.82rem; }

    @media (max-width: 850px) {
      .score-game-row { grid-template-columns: 48px minmax(0,1fr); }
      .score-control { grid-column: 2; }
      .team-box:last-of-type { grid-column: 2; }
      .admin-panel { grid-template-columns: 1fr; }
    }

    @media (max-width: 620px) {
      .app-shell { width: min(100% - 20px,1120px); padding: 18px 0 38px; }
      .hero { padding: 25px 21px; border-radius: 22px; }
      .panel { padding: 20px 15px; border-radius: 18px; }
      .panel-heading { display: grid; }
      .summary-badge { width: fit-content; }
      .score-summary { grid-template-columns: 1fr; }
      .score-game-row { grid-template-columns: 42px minmax(0,1fr); padding: 8px; }
      .team-box { grid-template-columns: 1fr; }
      .player-name { font-size: 1.28rem; }
      .player-position { font-size: 0.9rem; }
      .score-actions { grid-template-columns: 1fr; }
      .page-switcher a { padding-inline: 5px; font-size: 0.76rem; }
    }
  

    /* v6 mobile-first score layout */
    .app-shell { padding: 18px 0 28px; }
    .hero { padding: 18px 22px; margin-bottom: 12px; border-radius: 20px; }
    .hero h1 { font-size: clamp(1.65rem, 7vw, 2.35rem); }
    .layout { gap: 12px; }
    .panel { padding: 16px; border-radius: 18px; }
    .panel-heading { margin-bottom: 10px; }
    .score-summary { grid-template-columns: repeat(3,minmax(0,1fr)); gap: 6px; margin-bottom: 10px; }
    .summary-card { padding: 9px; border-radius: 10px; }
    .summary-card span { font-size: .68rem; }
    .summary-card strong { font-size: 1.05rem; }
    .schedule-list { gap: 10px; }
    .schedule-card { border-radius: 13px; }
    .schedule-header { padding: 9px 11px; }
    .schedule-header span { font-size: .72rem; }
    .schedule-header h3 { font-size: 1rem; }
    .game-list { gap: 7px; padding: 8px; }
    .score-game-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      padding: 7px;
      border-radius: 10px;
      transition: background .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .score-game-row.confirmed {
      background: #e9f8f1;
      border: 2px solid #2b8b74;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.7), 0 4px 12px rgba(23,108,91,.12);
    }
    .game-row-header { display:flex; align-items:center; justify-content:space-between; gap:6px; }
    .game-number { min-height: 0; padding: 3px 8px; border-radius: 7px; font-size: .76rem; display:inline-flex; width:fit-content; }
    .game-status-badge { padding: 3px 8px; border-radius: 999px; color:#7a8782; background:#eef3f1; font-size:.68rem; font-weight:950; }
    .game-status-badge.confirmed { color:#fff; background:#176c5b; }
    .game-matchup { display:grid; grid-template-columns:minmax(0,1fr) 112px minmax(0,1fr); gap:6px; align-items:stretch; }
    .game-matchup .score-control, .game-matchup .team-box:last-of-type { grid-column:auto; }
    .team-box { grid-template-columns: 1fr; gap: 3px; }
    .player-box { padding: 6px 7px; border-radius: 7px; }
    .player-position { font-size: .68rem; line-height:1.1; }
    .player-name { font-size: 1rem; line-height: 1.1; }
    .score-control { padding: 5px; gap: 4px; grid-template-columns:minmax(34px,1fr) 10px minmax(34px,1fr); border-radius:8px; }
    .score-control input { min-height: 36px; padding: 3px; border-radius:7px; font-size:1.12rem; }
    .score-separator { font-size: .95rem; }
    .score-actions { gap:4px; margin-top:1px; }
    .button { min-height: 34px; padding: 5px 8px; border-radius: 7px; font-size: .72rem; }
    .score-state { font-size:.6rem; gap:3px; line-height:1.2; }
    .confirmed-label { font-size:.7rem; font-weight:950; }
    .event-meta { gap:5px; }
    .meta-chip { padding:5px 8px; font-size:.7rem; }
    .admin-panel { padding:10px; gap:7px; }
    .admin-panel input { min-height:40px; padding:7px 9px; }

    @media (max-width: 620px) {
      .app-shell { width:min(100% - 10px,1120px); padding:5px 0 16px; }
      .page-switcher { top:3px; gap:3px; padding:3px; margin-bottom:6px; border-radius:10px; }
      .page-switcher a { min-height:34px; padding:4px 2px; font-size:.69rem; border-radius:7px; }
      .hero { padding:11px 14px; margin-bottom:6px; border-radius:13px; }
      .hero .eyebrow { margin-bottom:2px; font-size:.62rem; }
      .hero h1 { font-size:1.42rem; }
      .panel { padding:9px 7px; border-radius:12px; }
      .panel-heading { margin-bottom:6px; }
      .panel-heading h2 { font-size:1rem; }
      .summary-badge { padding:4px 7px; font-size:.68rem; }
      .score-summary { margin-bottom:7px; }
      .summary-card { padding:6px; }
      .summary-card strong { font-size:.92rem; }
      .schedule-header { padding:7px 8px; }
      .game-list { gap:5px; padding:5px; }
      .score-game-row { padding:5px; gap:4px; }
      .game-matchup { grid-template-columns:minmax(0,1fr) 92px minmax(0,1fr); gap:4px; }
      .player-box { padding:4px 5px; border-width:1px; }
      .player-position { font-size:.59rem; }
      .player-name { font-size:.82rem; }
      .score-control { padding:3px; gap:2px; grid-template-columns:minmax(28px,1fr) 7px minmax(28px,1fr); }
      .score-control input { min-height:31px; font-size:1rem; padding:1px; }
      .score-actions { grid-template-columns:1fr auto; gap:3px; }
      .button { min-height:29px; padding:3px 5px; font-size:.65rem; }
      .score-state { font-size:.55rem; }
      .admin-panel { grid-template-columns:1fr; }
    }


    @media (max-width: 720px) {
      .page-switcher { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .page-switcher a { font-size: .64rem; letter-spacing: -.03em; }
    }

    .backup-status {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 9px;
      margin: -2px 0 9px;
      color: #31564d;
      background: #eef8f4;
      border: 1px solid #cfe6dd;
      border-radius: 9px;
      font-size: .68rem;
      font-weight: 800;
      line-height: 1.35;
    }
    .backup-status.show { display: flex; }
    .backup-status strong { color: var(--primary); font-size: .72rem; }
    .backup-status span { min-width: 0; overflow-wrap: anywhere; }
    @media (max-width: 650px) {
      .backup-status { padding: 5px 7px; margin-bottom: 6px; font-size: .6rem; }
      .backup-status strong { font-size: .64rem; white-space: nowrap; }
    }


    .access-gate {
      position: fixed; inset: 0; z-index: 9999; display: grid; place-items: center;
      padding: 18px; background: rgba(11, 31, 26, .82); backdrop-filter: blur(5px);
    }
    .access-gate[hidden] { display: none !important; }
    .access-card { width: min(390px, 100%); padding: 20px; background: #fff; border-radius: 18px; box-shadow: 0 24px 70px rgba(0,0,0,.28); }
    .access-card h2 { margin: 0 0 12px; font-size: 1.25rem; }
    .access-card .field { margin-bottom: 10px; }
    .access-error { min-height: 20px; margin-top: 8px; color: var(--danger); font-size: .82rem; font-weight: 800; }
    .subadmin-panel { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 7px; align-items: end; padding: 9px; margin-bottom: 9px; background: #fff8e8; border: 1px solid #ead49a; border-radius: 10px; }
    .subadmin-panel.is-active { background: #eaf8f1; border-color: #9fd1bd; }
    .subadmin-panel .field-label { font-size: .68rem; }
    .subadmin-panel input { min-height: 38px; }
    .subadmin-actions { display: flex; gap: 6px; align-items: center; }
    .subadmin-actions .button { white-space: nowrap; }
    .subadmin-actions .button[hidden] { display: none !important; }
    .subadmin-status { grid-column: 1 / -1; color: #6f571c; font-size: .68rem; font-weight: 850; }
    @media (max-width: 650px) {
      .access-card { padding: 16px; }
      .subadmin-panel { grid-template-columns: 1fr; padding: 7px; gap: 5px; }
      .subadmin-panel input { min-height: 34px; }
      .subadmin-actions { display: grid; grid-template-columns: 1fr 1fr; width: 100%; }
      .subadmin-panel:not(.is-active) .subadmin-actions { grid-template-columns: 1fr; }
      .subadmin-actions .button { width: 100%; min-height: 34px; padding: 5px 8px; font-size: .68rem; }
    }

</style>
</head>
<body>
<div class="access-gate" id="accessGate">
  <div class="access-card">
    <h2>참가자 비밀번호 입력</h2>
    <label class="field" for="participantGatePassword"><span class="field-label">대회 참가자 비밀번호</span><input id="participantGatePassword" type="password" inputmode="numeric" maxlength="20" autocomplete="one-time-code" placeholder="비밀번호 입력"/></label>
    <button class="button button-primary" id="participantGateButton" type="button">대회 입장</button>
    <div class="access-error" id="participantGateError"></div>
  </div>
</div>
<main class="app-shell">
<nav aria-label="페이지 이동" class="page-switcher">
<a href="./index.html" id="mainPageLink">1. 추첨·대진 생성</a>
<a aria-current="page" class="active" href="./scores.html" id="scorePageLink">2. 경기 스코어</a>
<a href="./results.html" id="resultsPageLink">3. 경기 결과</a>
<a href="./admin.html" id="adminPageLink">관리자</a>
</nav>
<header class="hero">
<p class="eyebrow">Tennis Match Score</p>
<h1>경기 스코어 입력</h1>
</header>
<div class="layout"><section aria-labelledby="scoreTitle" class="panel">
<div class="panel-heading">
<div>
<h2 id="scoreTitle">조별 경기</h2>
</div>
</div>
<div aria-live="assertive" class="message" id="messageBox" role="alert"></div><div class="score-summary" id="scoreSummary"></div>
<div aria-live="polite" class="backup-status" id="backupStatus"></div>
<div class="schedule-list" id="scheduleList">
<div class="empty-state">대진표를 불러오고 있습니다.</div>
</div>
</section><section aria-labelledby="eventTitle" class="panel">
<div class="panel-heading">
<div>
<h2 id="eventTitle">경기 정보 불러오는 중</h2>
<p hidden="" id="eventDescription"></p>
</div>
<div class="summary-badge" id="roundBadge">-</div>
</div>

<div class="event-meta" id="eventMeta"></div>
</section><section aria-labelledby="subadminTitle" class="panel">
<div class="panel-heading"><div><h2 id="subadminTitle">서브관리자 권한</h2></div></div>
<div class="subadmin-panel" id="subadminPanel">
<label class="field" for="subadminPasswordInput"><span class="field-label">서브관리자 비밀번호</span><input id="subadminPasswordInput" type="password" inputmode="numeric" maxlength="20" autocomplete="off" placeholder="비밀번호 입력"/></label>
<div class="subadmin-actions">
<button class="button button-secondary" id="subadminActivateButton" type="button">권한 활성화</button>
<button class="button button-danger" hidden id="subadminLogoutButton" type="button">서브관리자 로그아웃</button>
</div>
<div class="subadmin-status" id="subadminStatus">참가자 입장 후, 서브관리자 비밀번호를 추가 입력하면 확정 스코어 수정·초기화가 가능합니다.</div>
</div>
</section><section aria-labelledby="adminTitle" class="panel">
<div class="panel-heading">
<div>
<h2 id="adminTitle">관리자 기능</h2>
</div>
</div>
<div class="admin-panel" id="adminLoginPanel">
<input autocomplete="username" id="adminEmail" placeholder="관리자 이메일" type="email"/>
<input autocomplete="current-password" id="adminPassword" placeholder="관리자 비밀번호" type="password"/>
<button class="button button-secondary" id="adminLoginButton" type="button">관리자 로그인</button>
</div>
<div class="admin-status" id="adminStatus">
<span id="adminStatusText"></span>
<button class="button button-secondary" id="adminLogoutButton" type="button">로그아웃</button>
</div>
</section></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (() => {
      "use strict";

      const SUPABASE_URL = "https://mktdpjkcumyamweynqmp.supabase.co";
      const SUPABASE_KEY = "sb_publishable_lwcj15eyh93kU0Jq2kT8Ng_MaDE7BUN";
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const eventTitle = document.getElementById("eventTitle");
      const eventDescription = document.getElementById("eventDescription");
      const roundBadge = document.getElementById("roundBadge");
      const eventMeta = document.getElementById("eventMeta");
      const messageBox = document.getElementById("messageBox");
      const scoreSummary = document.getElementById("scoreSummary");
      const backupStatus = document.getElementById("backupStatus");
      const scheduleList = document.getElementById("scheduleList");
      const mainPageLink = document.getElementById("mainPageLink");
      const scorePageLink = document.getElementById("scorePageLink");
      const resultsPageLink = document.getElementById("resultsPageLink");
      const adminPageLink = document.getElementById("adminPageLink");
      const adminLoginPanel = document.getElementById("adminLoginPanel");
      const adminEmail = document.getElementById("adminEmail");
      const adminPassword = document.getElementById("adminPassword");
      const adminLoginButton = document.getElementById("adminLoginButton");
      const adminStatus = document.getElementById("adminStatus");
      const adminStatusText = document.getElementById("adminStatusText");
      const adminLogoutButton = document.getElementById("adminLogoutButton");
      const accessGate = document.getElementById("accessGate");
      const participantGatePassword = document.getElementById("participantGatePassword");
      const participantGateButton = document.getElementById("participantGateButton");
      const participantGateError = document.getElementById("participantGateError");
      const subadminPanel = document.getElementById("subadminPanel");
      const subadminPasswordInput = document.getElementById("subadminPasswordInput");
      const subadminActivateButton = document.getElementById("subadminActivateButton");
      const subadminLogoutButton = document.getElementById("subadminLogoutButton");
      const subadminStatus = document.getElementById("subadminStatus");

      const EVENT_CONTEXT_STORAGE_KEY = "tennis-current-event-context";

      function readEventContext() {
        try {
          const raw = sessionStorage.getItem(EVENT_CONTEXT_STORAGE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed && parsed.eventId ? parsed : null;
        } catch (_) {
          return null;
        }
      }

      function saveEventContext(nextEventId, nextShareCode) {
        if (!nextEventId) return;
        try {
          sessionStorage.setItem(EVENT_CONTEXT_STORAGE_KEY, JSON.stringify({
            eventId: String(nextEventId),
            shareCode: String(nextShareCode || ""),
            savedAt: Date.now()
          }));
        } catch (_) {
          // 세션 저장소를 사용할 수 없어도 현재 URL로 계속 동작합니다.
        }
      }

      const params = new URLSearchParams(window.location.search);
      let eventId = params.get("event") || "";
      let shareCode = params.get("code") || "";

      if (!eventId) {
        const savedContext = readEventContext();
        if (savedContext?.eventId) {
          eventId = String(savedContext.eventId);
          shareCode = String(savedContext.shareCode || "");
          const recoveredUrl = new URL(window.location.href);
          recoveredUrl.searchParams.set("event", eventId);
          if (shareCode) recoveredUrl.searchParams.set("code", shareCode);
          window.history.replaceState({}, "", recoveredUrl.toString());
        }
      }

      saveEventContext(eventId, shareCode);

      let eventData = null;
      let currentUser = null;
      let isEventOwner = false;
      let scoreRows = new Map();
      let scoreChannel = null;
      let eventChannel = null;
      let accessToken = "";
      let accessRole = "";
      const accessTokenStorageKey = `tennis-access-token:${eventId}`;

      function buildSiblingPageUrl(fileName) {
        const url = new URL(window.location.href);
        const parts = url.pathname.split("/");
        parts[parts.length - 1] = fileName;
        url.pathname = parts.join("/");
        url.search = "";
        url.hash = "";
        if (eventId) url.searchParams.set("event", eventId);
        if (shareCode) url.searchParams.set("code", shareCode);
        return url.toString();
      }

      mainPageLink.href = buildSiblingPageUrl("index.html");
      scorePageLink.href = buildSiblingPageUrl("scores.html");
      resultsPageLink.href = buildSiblingPageUrl("results.html");
      adminPageLink.href = buildSiblingPageUrl("admin.html");

      function clearMessage() {
        messageBox.className = "message";
        messageBox.textContent = "";
      }

      function showMessage(text, type = "warning") {
        messageBox.textContent = text;
        messageBox.className = `message show ${type}`;
      }

      function createElement(tag, className, text) {
        const el = document.createElement(tag);
        if (className) el.className = className;
        if (text !== undefined) el.textContent = text;
        return el;
      }

      function scoreKey(scheduleKey, gameNumber) {
        return `${scheduleKey}::${gameNumber}`;
      }

      function formatDate(value) {
        if (!value) return "";
        try {
          return new Intl.DateTimeFormat("ko-KR", {
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
          }).format(new Date(value));
        } catch (_) {
          return "";
        }
      }


      function readStoredAccessToken() {
        try { return localStorage.getItem(accessTokenStorageKey) || ""; }
        catch (_) { return ""; }
      }

      function storeAccessToken(token) {
        accessToken = token || "";
        try {
          if (accessToken) localStorage.setItem(accessTokenStorageKey, accessToken);
          else localStorage.removeItem(accessTokenStorageKey);
        } catch (_) {}
      }

      function updateSubadminUi() {
        const active = accessRole === "subadmin";
        subadminPanel.classList.toggle("is-active", active);
        subadminActivateButton.hidden = active;
        subadminActivateButton.disabled = active;
        subadminLogoutButton.hidden = !active;
        subadminLogoutButton.disabled = false;
        subadminPasswordInput.disabled = active;
        subadminStatus.textContent = active
          ? "서브관리자 권한 활성화됨 · 로그아웃하면 일반 참가자 상태로 돌아갑니다."
          : "참가자 입장 후, 서브관리자 비밀번호를 추가 입력하면 확정 스코어 수정·초기화가 가능합니다.";
        if (eventData) renderSchedules();
      }

      async function validateStoredAccess() {
        const token = readStoredAccessToken();
        if (!token || !eventId) return false;
        const { data, error } = await db.rpc("validate_tennis_access_session", {
          p_event_id: String(eventId),
          p_token: token
        });
        if (error || !data?.valid) {
          storeAccessToken("");
          accessRole = "";
          return false;
        }
        storeAccessToken(token);
        accessRole = data.role || "participant";
        accessGate.hidden = true;
        updateSubadminUi();
        return true;
      }

      async function enterWithParticipantPassword() {
        const password = participantGatePassword.value.trim();
        if (!password) {
          participantGateError.textContent = "참가자 비밀번호를 입력해 주세요.";
          return false;
        }
        participantGateButton.disabled = true;
        participantGateButton.textContent = "확인 중...";
        const { data, error } = await db.rpc("create_tennis_access_session", {
          p_event_id: String(eventId),
          p_share_code: String(shareCode),
          p_participant_password: password
        });
        participantGateButton.disabled = false;
        participantGateButton.textContent = "대회 입장";
        if (error) {
          participantGateError.textContent = error.message || "참가자 비밀번호가 올바르지 않습니다.";
          return false;
        }
        storeAccessToken(data?.token || "");
        accessRole = data?.role || "participant";
        participantGatePassword.value = "";
        participantGateError.textContent = "";
        accessGate.hidden = true;
        updateSubadminUi();
        await loadScores();
        subscribeRealtime();
        return true;
      }

      async function activateSubadmin() {
        const password = subadminPasswordInput.value.trim();
        if (!password || !accessToken) {
          showMessage("참가자 입장 후 서브관리자 비밀번호를 입력해 주세요.", "warning");
          return;
        }
        subadminActivateButton.disabled = true;
        const { data, error } = await db.rpc("upgrade_tennis_access_session", {
          p_event_id: String(eventId),
          p_token: accessToken,
          p_subadmin_password: password
        });
        subadminActivateButton.disabled = false;
        if (error) {
          showMessage(`서브관리자 권한 활성화 실패: ${error.message}`, "error");
          return;
        }
        accessRole = data?.role || "subadmin";
        subadminPasswordInput.value = "";
        updateSubadminUi();
        showMessage("서브관리자 권한이 활성화되었습니다.", "success");
      }

      async function logoutSubadmin() {
        if (accessRole !== "subadmin" || !accessToken || !eventId) {
          accessRole = accessToken ? "participant" : "";
          updateSubadminUi();
          return;
        }

        subadminLogoutButton.disabled = true;
        subadminLogoutButton.textContent = "로그아웃 중...";
        const { data, error } = await db.rpc("downgrade_tennis_access_session", {
          p_event_id: String(eventId),
          p_token: accessToken
        });
        subadminLogoutButton.disabled = false;
        subadminLogoutButton.textContent = "서브관리자 로그아웃";

        if (error) {
          showMessage(`서브관리자 로그아웃 실패: ${error.message}`, "error");
          return;
        }

        accessRole = data?.role || "participant";
        subadminPasswordInput.value = "";
        updateSubadminUi();
        showMessage("서브관리자 권한을 종료하고 일반 참가자 상태로 전환했습니다.", "warning");
      }

      function updateAdminUi() {
        isEventOwner = Boolean(
          currentUser && eventData && String(eventData.owner_id || "") === String(currentUser.id)
        );

        if (currentUser) {
          adminLoginPanel.style.display = "none";
          adminStatus.style.display = "flex";
          adminStatusText.textContent = isEventOwner
            ? `대회 관리자 로그인: ${currentUser.email}`
            : `로그인 계정은 이 대회의 관리자가 아닙니다: ${currentUser.email}`;
        } else {
          adminLoginPanel.style.display = "grid";
          adminStatus.style.display = "none";
          adminStatusText.textContent = "";
        }

        if (eventData) renderSchedules();
      }

      async function initializeSession() {
        const { data, error } = await db.auth.getSession();
        if (error) {
          console.error(error);
          currentUser = null;
        } else {
          currentUser = data.session?.user || null;
        }
        updateAdminUi();
      }

      async function loginAdmin() {
        const email = adminEmail.value.trim();
        const password = adminPassword.value;
        if (!email || !password) {
          showMessage("관리자 이메일과 비밀번호를 입력해 주세요.", "warning");
          return;
        }

        adminLoginButton.disabled = true;
        adminLoginButton.textContent = "로그인 중...";
        const { data, error } = await db.auth.signInWithPassword({ email, password });
        adminLoginButton.disabled = false;
        adminLoginButton.textContent = "관리자 로그인";

        if (error) {
          showMessage(`관리자 로그인 실패: ${error.message}`, "error");
          return;
        }

        adminPassword.value = "";
        currentUser = data.user;
        updateAdminUi();
        showMessage(isEventOwner ? "관리자 권한이 활성화되었습니다." : "로그인했지만 이 대회의 관리자 계정이 아닙니다.", isEventOwner ? "success" : "warning");
      }

      async function logoutAdmin() {
        await db.auth.signOut();
        currentUser = null;
        updateAdminUi();
        showMessage("로그아웃했습니다.", "warning");
      }

      async function loadEvent() {
        if (!eventId) {
          eventTitle.textContent = "공유 주소가 필요합니다";
          eventDescription.textContent = "1페이지에서 생성된 사용자 공유 주소로 접속해 주세요.";
          scheduleList.innerHTML = '<div class="empty-state">주소에 event 값이 없습니다.</div>';
          showMessage("올바른 사용자 공유 주소로 접속해 주세요.", "error");
          return false;
        }

        const { data, error } = await db
          .from("tennis_events")
          .select("*")
          .eq("id", eventId)
          .single();

        if (error) {
          showMessage(`대회 정보를 불러오지 못했습니다: ${error.message}`, "error");
          scheduleList.innerHTML = '<div class="empty-state">대회 정보를 불러올 수 없습니다.</div>';
          return false;
        }

        if (shareCode && data.share_code !== shareCode) {
          showMessage("공유 코드가 올바르지 않습니다.", "error");
          scheduleList.innerHTML = '<div class="empty-state">공유 코드가 일치하지 않습니다.</div>';
          return false;
        }

        eventData = data;
        document.title = `${eventData.title || "테니스 경기"} · 스코어`;
        const schedules = eventData.draw_data?.gameSchedules || [];
        eventTitle.textContent = eventData.title || "테니스 경기";
        eventDescription.textContent = "대진표를 확인하고 각 경기 종료 후 스코어를 확정해 주세요.";
        roundBadge.textContent = `${eventData.draw_round || 1}회차`;

        eventMeta.replaceChildren(
          createElement("span", "meta-chip", `참가자 ${eventData.draw_data?.totalParticipants || 0}명`),
          createElement("span", "meta-chip", `대진 ${schedules.length}개`),
          createElement("span", "meta-chip", `공유 코드 ${eventData.share_code}`)
        );

        updateAdminUi();
        return true;
      }

      async function loadBackupStatus() {
        if (!eventData || !backupStatus) return;

        const { data, error } = await db.rpc("get_tennis_auto_backup_status", {
          p_event_id: String(eventData.id)
        });

        if (error) {
          backupStatus.classList.remove("show");
          backupStatus.replaceChildren();
          console.warn("자동 백업 상태 조회 실패:", error);
          return;
        }

        const status = Array.isArray(data) ? data[0] : data;
        if (!status) {
          backupStatus.classList.remove("show");
          return;
        }

        const autoCount = Number(status.auto_snapshot_count || 0);
        const manualCount = Number(status.manual_snapshot_count || 0);
        const changes = Number(status.changes_since_backup || 0);
        const nextCount = Number(status.next_score_backup_in || 0);
        const elapsed = Boolean(status.ten_minutes_elapsed);
        const lastAt = status.last_snapshot_at ? formatDate(status.last_snapshot_at) : "없음";
        const lastType = status.last_snapshot_type === "manual" ? "수동" : "자동";

        let nextText;
        if (!status.last_snapshot_at) {
          nextText = `첫 자동 백업까지 ${Math.max(1, nextCount)}경기`;
        } else if (elapsed && changes > 0) {
          nextText = "다음 스코어 확정 시 자동 백업";
        } else if (nextCount <= 0) {
          nextText = "자동 백업 준비 완료";
        } else {
          nextText = `다음 자동 백업까지 ${nextCount}경기`;
        }

        backupStatus.replaceChildren();
        const left = createElement("span", "", `최근 ${lastType} 백업 ${lastAt} · 이후 ${changes}경기`);
        const right = createElement("strong", "", `${nextText} · 자동 ${autoCount}/10 · 수동 ${manualCount}`);
        backupStatus.append(left, right);
        backupStatus.classList.add("show");
      }

      async function loadScores() {
        if (!eventData) return;
        const { data, error } = await db
          .from("tennis_match_scores")
          .select("*")
          .eq("event_id", String(eventData.id))
          .eq("draw_round", Number(eventData.draw_round || 1));

        if (error) {
          console.error(error);
          scoreRows = new Map();
          renderSchedules();
          showMessage(
            `스코어 저장 테이블을 불러오지 못했습니다. supabase_score_setup.sql 적용 여부를 확인해 주세요: ${error.message}`,
            "error"
          );
          return;
        }

        scoreRows = new Map(
          (data || []).map((row) => [scoreKey(row.schedule_key, row.game_number), row])
        );
        renderSchedules();
        await loadBackupStatus();
      }

      function createPlayer(player) {
        const box = createElement("div", "player-box");
        box.append(
          createElement("span", "player-position", `${player.groupName} · ${player.position}`),
          createElement("strong", "player-name", player.name)
        );
        return box;
      }

      function createTeam(players) {
        const team = createElement("div", "team-box");
        players.forEach((player) => team.appendChild(createPlayer(player)));
        return team;
      }

      function createSummaryCard(label, value) {
        const card = createElement("div", "summary-card");
        card.append(createElement("span", "", label), createElement("strong", "", value));
        return card;
      }

      function updateScoreSummary(schedules) {
        const allGames = schedules.flatMap((schedule) => schedule.games || []);
        const total = allGames.length;
        let confirmed = 0;
        schedules.forEach((schedule) => {
          (schedule.games || []).forEach((game) => {
            if (scoreRows.has(scoreKey(schedule.key, game.gameNumber))) confirmed += 1;
          });
        });

        scoreSummary.replaceChildren(
          createSummaryCard("전체 경기", `${total}경기`),
          createSummaryCard("확정 완료", `${confirmed}경기`),
          createSummaryCard("입력 대기", `${Math.max(0, total - confirmed)}경기`)
        );
      }

      function createScoreGameRow(schedule, game) {
        const key = scoreKey(schedule.key, game.gameNumber);
        const saved = scoreRows.get(key) || null;
        const row = createElement("li", "score-game-row");
        row.dataset.scheduleKey = schedule.key;
        row.dataset.scheduleTitle = schedule.title;
        row.dataset.gameNumber = String(game.gameNumber);
        if (saved) row.classList.add("confirmed");

        const rowHeader = createElement("div", "game-row-header");
        rowHeader.append(
          createElement("span", "game-number", `게임 ${game.gameNumber}`),
          createElement("span", `game-status-badge${saved ? " confirmed" : ""}`, saved ? "✓ 확정" : "입력 대기")
        );

        const matchup = createElement("div", "game-matchup");
        matchup.appendChild(createTeam(game.team1));

        const control = createElement("div", "score-control");
        const input1 = document.createElement("input");
        input1.className = "team1-score";
        input1.type = "number";
        input1.inputMode = "numeric";
        input1.min = "0";
        input1.max = "6";
        input1.step = "1";
        input1.placeholder = "0";
        input1.setAttribute("aria-label", `${schedule.title} 게임 ${game.gameNumber} 1팀 점수`);

        const input2 = input1.cloneNode();
        input2.className = "team2-score";
        input2.setAttribute("aria-label", `${schedule.title} 게임 ${game.gameNumber} 2팀 점수`);

        if (saved) {
          input1.value = String(saved.team1_score);
          input2.value = String(saved.team2_score);
          input1.disabled = true;
          input2.disabled = true;
        }

        control.append(input1, createElement("span", "score-separator", ":"), input2);

        const actions = createElement("div", "score-actions");
        const primary = createElement("button", "button button-primary");
        primary.type = "button";
        primary.dataset.action = saved ? "edit" : "confirm";
        const canManageScore = isEventOwner || accessRole === "subadmin";
        primary.textContent = saved ? (canManageScore ? "수정" : "확정 완료") : "확정";
        primary.disabled = Boolean(saved && !canManageScore);
        actions.appendChild(primary);

        if (saved && (isEventOwner || accessRole === "subadmin")) {
          const reset = createElement("button", "button button-danger", "초기화");
          reset.type = "button";
          reset.dataset.action = "reset";
          actions.appendChild(reset);
        }

        const state = createElement("div", "score-state");
        state.append(
          createElement("span", saved ? "confirmed-label" : "", saved ? "확정된 경기" : "6점 승리 또는 5:5 무승부"),
          createElement("span", "", saved ? formatDate(saved.confirmed_at || saved.updated_at) : "")
        );
        control.append(actions, state);

        matchup.append(control, createTeam(game.team2));
        row.append(rowHeader, matchup);
        return row;
      }

      function renderSchedules() {
        if (!eventData) return;
        const schedules = eventData.draw_data?.gameSchedules || [];
        scheduleList.replaceChildren();
        updateScoreSummary(schedules);

        if (!schedules.length) {
          scheduleList.appendChild(createElement("div", "empty-state", "저장된 경기 대진표가 없습니다. 1페이지에서 경기를 다시 생성해 주세요."));
          return;
        }

        const fragment = document.createDocumentFragment();
        schedules.forEach((schedule) => {
          const card = createElement("section", "schedule-card");
          const header = createElement("div", "schedule-header");
          const titleWrap = createElement("div");
          titleWrap.append(createElement("span", "", schedule.subtitle || schedule.type), createElement("h3", "", schedule.title));
          header.append(titleWrap, createElement("span", "summary-badge", `${schedule.games.length}경기`));

          const list = createElement("ol", "game-list");
          schedule.games.forEach((game) => list.appendChild(createScoreGameRow(schedule, game)));
          card.append(header, list);
          fragment.appendChild(card);
        });
        scheduleList.appendChild(fragment);
      }

      function collectScores(row) {
        const team1Input = row.querySelector(".team1-score");
        const team2Input = row.querySelector(".team2-score");
        const team1 = Number(team1Input.value);
        const team2 = Number(team2Input.value);

        if (!Number.isInteger(team1) || !Number.isInteger(team2) || team1 < 0 || team2 < 0 || team1 > 6 || team2 > 6) {
          showMessage("양 팀 스코어를 0~6 사이의 정수로 입력해 주세요.", "error");
          return null;
        }

        const validWinScore =
          (team1 === 6 && team2 >= 0 && team2 <= 5) ||
          (team2 === 6 && team1 >= 0 && team1 <= 5);
        const validDrawScore = team1 === 5 && team2 === 5;

        if (!validWinScore && !validDrawScore) {
          showMessage("6:0~5 또는 0~5:6의 승패 스코어, 혹은 5:5 무승부만 확정할 수 있습니다.", "error");
          team1Input.focus();
          return null;
        }

        return { team1, team2 };
      }

      async function confirmScore(row) {
        const values = collectScores(row);
        if (!values || !eventData) return;
        if (!accessToken) {
          accessGate.hidden = false;
          showMessage("참가자 비밀번호 인증이 필요합니다.", "warning");
          return;
        }

        const { error } = await db.rpc("confirm_tennis_score", {
          p_token: accessToken || null,
          p_event_id: String(eventData.id),
          p_draw_round: Number(eventData.draw_round || 1),
          p_schedule_key: row.dataset.scheduleKey,
          p_schedule_title: row.dataset.scheduleTitle,
          p_game_number: Number(row.dataset.gameNumber),
          p_team1_score: values.team1,
          p_team2_score: values.team2
        });
        if (error) {
          if (error.code === "23505" || /이미 확정/.test(error.message || "")) {
            showMessage("다른 사용자가 이미 이 경기의 스코어를 확정했습니다. 최신 내용을 불러옵니다.", "warning");
            await loadScores();
            return;
          }
          showMessage(`스코어 저장 실패: ${error.message}`, "error");
          return;
        }

        showMessage("스코어가 확정되었습니다.", "success");
        await loadScores();
      }

      function enableAdminEdit(row) {
        row.classList.add("editing");
        row.querySelector(".team1-score").disabled = false;
        row.querySelector(".team2-score").disabled = false;
        const button = row.querySelector('[data-action="edit"]');
        button.dataset.action = "save-edit";
        button.textContent = "수정 저장";
        row.querySelector(".team1-score").focus();
      }

      async function saveAdminEdit(row) {
        if (!(isEventOwner || accessRole === "subadmin") || !eventData) return;
        const values = collectScores(row);
        if (!values) return;

        let error;
        if (isEventOwner) {
          const response = await db
            .from("tennis_match_scores")
            .update({
              team1_score: values.team1,
              team2_score: values.team2,
              is_confirmed: true,
              confirmed_at: new Date().toISOString(),
              updated_at: new Date().toISOString(),
              updated_by: currentUser.id
            })
            .eq("event_id", String(eventData.id))
            .eq("draw_round", Number(eventData.draw_round || 1))
            .eq("schedule_key", row.dataset.scheduleKey)
            .eq("game_number", Number(row.dataset.gameNumber));
          error = response.error;
        } else {
          const response = await db.rpc("subadmin_update_tennis_score", {
            p_token: accessToken,
            p_event_id: String(eventData.id),
            p_draw_round: Number(eventData.draw_round || 1),
            p_schedule_key: row.dataset.scheduleKey,
            p_game_number: Number(row.dataset.gameNumber),
            p_team1_score: values.team1,
            p_team2_score: values.team2
          });
          error = response.error;
        }

        if (error) {
          showMessage(`관리자 스코어 수정 실패: ${error.message}`, "error");
          return;
        }
        showMessage("관리자가 스코어를 수정했습니다.", "success");
        await loadScores();
      }

      async function resetScore(row) {
        if (!(isEventOwner || accessRole === "subadmin") || !eventData) return;
        const confirmed = window.confirm("이 경기의 확정 스코어를 초기화할까요? 초기화 후 사용자가 다시 입력할 수 있습니다.");
        if (!confirmed) return;

        let error;
        if (isEventOwner) {
          const response = await db
            .from("tennis_match_scores")
            .delete()
            .eq("event_id", String(eventData.id))
            .eq("draw_round", Number(eventData.draw_round || 1))
            .eq("schedule_key", row.dataset.scheduleKey)
            .eq("game_number", Number(row.dataset.gameNumber));
          error = response.error;
        } else {
          const response = await db.rpc("subadmin_reset_tennis_score", {
            p_token: accessToken,
            p_event_id: String(eventData.id),
            p_draw_round: Number(eventData.draw_round || 1),
            p_schedule_key: row.dataset.scheduleKey,
            p_game_number: Number(row.dataset.gameNumber)
          });
          error = response.error;
        }

        if (error) {
          showMessage(`스코어 초기화 실패: ${error.message}`, "error");
          return;
        }
        showMessage("스코어를 초기화했습니다. 다시 입력할 수 있습니다.", "success");
        await loadScores();
      }

      function subscribeRealtime() {
        if (!eventData) return;
        if (scoreChannel) db.removeChannel(scoreChannel);
        if (eventChannel) db.removeChannel(eventChannel);

        scoreChannel = db
          .channel(`tennis-scores-${eventData.id}`)
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "tennis_match_scores",
            filter: `event_id=eq.${eventData.id}`
          }, () => loadScores())
          .subscribe();

        eventChannel = db
          .channel(`tennis-event-score-${eventData.id}`)
          .on("postgres_changes", {
            event: "UPDATE",
            schema: "public",
            table: "tennis_events",
            filter: `id=eq.${eventData.id}`
          }, async () => {
            const previousRound = Number(eventData.draw_round || 1);
            const loaded = await loadEvent();
            if (loaded) {
              await loadScores();
              if (Number(eventData.draw_round || 1) !== previousRound) {
                showMessage("관리자가 재추첨하여 새로운 대진표로 갱신되었습니다.", "warning");
              }
            }
          })
          .subscribe();
      }

      scheduleList.addEventListener("input", (event) => {
        const input = event.target.closest(".team1-score, .team2-score");
        if (!input || input.value === "") return;

        const numeric = Number(input.value);
        if (!Number.isFinite(numeric)) {
          input.value = "";
          return;
        }

        input.value = String(Math.min(6, Math.max(0, Math.trunc(numeric))));
      });

      scheduleList.addEventListener("click", async (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const row = button.closest(".score-game-row");
        if (!row) return;
        button.disabled = true;

        try {
          const action = button.dataset.action;
          if (action === "confirm") await confirmScore(row);
          if (action === "edit" && (isEventOwner || accessRole === "subadmin")) enableAdminEdit(row);
          if (action === "save-edit" && (isEventOwner || accessRole === "subadmin")) await saveAdminEdit(row);
          if (action === "reset" && (isEventOwner || accessRole === "subadmin")) await resetScore(row);
        } finally {
          if (button.isConnected) button.disabled = false;
        }
      });

      participantGateButton.addEventListener("click", enterWithParticipantPassword);
      participantGatePassword.addEventListener("keydown", (event) => { if (event.key === "Enter") { event.preventDefault(); enterWithParticipantPassword(); } });
      subadminActivateButton.addEventListener("click", activateSubadmin);
      subadminLogoutButton.addEventListener("click", logoutSubadmin);
      subadminPasswordInput.addEventListener("keydown", (event) => { if (event.key === "Enter") { event.preventDefault(); activateSubadmin(); } });

      adminLoginButton.addEventListener("click", loginAdmin);
      adminLogoutButton.addEventListener("click", logoutAdmin);
      adminPassword.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          loginAdmin();
        }
      });

      db.auth.onAuthStateChange((_event, session) => {
        currentUser = session?.user || null;
        updateAdminUi();
      });

      (async () => {
        await initializeSession();
        const loaded = await loadEvent();
        if (!loaded) return;
        const ownerBypass = Boolean(currentUser && String(eventData.owner_id || "") === String(currentUser.id));
        if (ownerBypass) {
          accessGate.hidden = true;
          accessRole = "owner";
        } else {
          const accessValid = await validateStoredAccess();
          if (!accessValid) {
            accessGate.hidden = false;
            participantGatePassword.focus();
            return;
          }
        }
        await loadScores();
        subscribeRealtime();
      })();
    })();
  </script>
</body>
</html>
